// ХЕЛПЕРЫ
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function normalise(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[.!?,;"„“]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
function checkFill(userVal, ans, altAns = []) {
  const u = normalise(userVal);
  if (!u) return false;
  if (u === normalise(ans)) return true;
  return altAns.some((a) => normalise(a) === u);
}
// Сделать MC-вопросы с перетасованными опциями
function shuffleMC(questions) {
  return questions.map((q) => {
    if (q.type !== "mc") return q;
    const indexed = q.opts.map((o, i) => ({ o, correct: i === q.ans }));
    const sh = shuffle(indexed);
    return {
      ...q,
      opts: sh.map((x) => x.o),
      ans: sh.findIndex((x) => x.correct),
    };
  });
}
// Группировка вопросов по уровню + перемешать внутри уровня
function arrangeByLevel(questions) {
  const byLevel = {};
  questions.forEach((q) => {
    const l = q.level;
    if (!byLevel[l]) byLevel[l] = [];
    byLevel[l].push(q);
  });
  return Object.keys(byLevel)
    .sort((a, b) => +a - +b)
    .flatMap((l) => shuffle(byLevel[l]));
}

const RULES = [
  { id: "r001", title: "Personalpronomen - три падежа", topic: "rules:pronouns", level: "A1", html: "<div class=\"rule-box\">\n<h3>Personalpronomen - три падежа</h3>\n<table>\n<tbody>\n<tr><th>Nominativ (Wer?)</th><th>Akkusativ (Wen?)</th><th>Dativ (Wem?)</th></tr>\n<tr><td>ich</td><td>mich</td><td>mir</td></tr>\n<tr><td>du</td><td>dich</td><td>dir</td></tr>\n<tr><td>er</td><td>ihn</td><td>ihm</td></tr>\n<tr><td>es</td><td>es</td><td>ihm</td></tr>\n<tr><td>sie (она)</td><td>sie</td><td>ihr</td></tr>\n<tr><td>wir</td><td>uns</td><td>uns</td></tr>\n<tr><td>ihr (вы, группа)</td><td>euch</td><td>euch</td></tr>\n<tr><td>sie (они)</td><td>sie</td><td>ihnen</td></tr>\n<tr><td>Sie (вежл.)</td><td>Sie</td><td>Ihnen</td></tr>\n</tbody>\n</table>\n<p style=\"font-size:12px;margin-top:6px\">⚠ es в Dativ — <b>ihm</b>, не ihr | <b>ihr</b> = «ей» (Dativ от sie-она) и «вы» (группа, Nominativ) — два разных значения!</p>\n</div>" },
  { id: "r002", title: "Reflexivpronomen - возвратные местоимения (себя / себе)", topic: "rules:pronouns", level: "A1", html: "<div class=\"rule-box\">\n<h3>Reflexivpronomen - возвратные местоимения <span style=\"font-weight:400;font-size:12px;color:var(--text-muted)\">(себя / себе)</span></h3>\n<table>\n<tbody>\n<tr><th>Лицо</th><th>Akkusativ</th><th>Dativ</th></tr>\n<tr><td>ich</td><td>mich</td><td>mir</td></tr>\n<tr><td>du</td><td>dich</td><td>dir</td></tr>\n<tr><td>er/sie/es</td><td>sich</td><td>sich</td></tr>\n<tr><td>wir</td><td>uns</td><td>uns</td></tr>\n<tr><td>ihr</td><td>euch</td><td>euch</td></tr>\n<tr><td>sie/Sie</td><td>sich</td><td>sich</td></tr>\n</tbody>\n</table>\n<p style=\"font-size:12px;margin-top:6px\">💡 ich/du/wir/ihr — совпадают с Personalpronomen | <b>er/sie/es</b> и <b>sie/Sie</b> → всегда <b>sich</b><br/>\nAkk vs Dat: <b>Ich wasche mich</b> (я моюсь — себя, Akk) | <b>Ich wasche mir die Hände</b> (я мою себе руки — кому? мне, Dat)</p>\n</div>" },
  { id: "r003", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-weight:600;margin-bottom:8px\">Конструкция запрета через <b>man</b> (= \"нельзя\" / \"не разрешается\"):</p>\n<table style=\"margin-bottom:10px\">\n<tr><th>Структура</th><th>Пример</th><th>Перевод</th></tr>\n<tr><td>Man darf nicht + Verb</td><td>Man darf nicht grillen.</td><td>Здесь нельзя жарить на гриле.</td></tr>\n<tr><td>Man darf kein + Nomen</td><td>Man darf keine Haustiere haben.</td><td>Нельзя держать домашних животных.</td></tr>\n</table>\n<p style=\"font-size:12px\">💡 <b>nicht</b> — отрицает действие | <b>kein/keine</b> — отрицает существительное<br/>💡 <b>man</b> — безличное местоимение (= \"нельзя / не разрешается\" — без конкретного лица)</p>\n</div>" },
  { id: "r004", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<table style=\"margin-bottom:10px\">\n<tr><th>Глагол</th><th>Используется с</th><th>Пример</th></tr>\n<tr><td><b>sein</b></td><td>прилагательные, профессии, национальности</td><td>Ich <b>bin</b> Arzt. / Er <b>ist</b> müde.</td></tr>\n<tr><td><b>haben</b></td><td>существительные (что-то у тебя есть)</td><td>Ich <b>habe</b> Hunger. / Er <b>hat</b> Zeit.</td></tr>\n</table>\n<p style=\"font-size:12px;margin-top:8px\">💡 Проверка: «я <b>являюсь</b>...?» → sein  |  «у меня <b>есть</b>...?» → haben</p>\n</div>" },
  { id: "r005", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<div class=\"two-col\">\n<div>\n<p style=\"font-weight:600;margin-bottom:6px\">sein — быть</p>\n<table class=\"conj-table\"><tbody>\n<tr><td>ich</td><td>war</td></tr><tr><td>du</td><td>warst</td></tr>\n<tr><td>er/sie/es</td><td>war</td></tr><tr><td>wir</td><td>waren</td></tr>\n<tr><td>ihr</td><td>wart</td></tr><tr><td>sie/Sie</td><td>waren</td></tr>\n</tbody></table>\n</div>\n<div>\n<p style=\"font-weight:600;margin-bottom:6px\">haben — иметь</p>\n<table class=\"conj-table\"><tbody>\n<tr><td>ich</td><td>hatte</td></tr><tr><td>du</td><td>hattest</td></tr>\n<tr><td>er/sie/es</td><td>hatte</td></tr><tr><td>wir</td><td>hatten</td></tr>\n<tr><td>ihr</td><td>hattet</td></tr><tr><td>sie/Sie</td><td>hatten</td></tr>\n</tbody></table>\n</div>\n</div>\n<p style=\"font-size:12px;margin-top:10px\">💡 Wie war das Treffen? — Das Treffen <b>war</b> toll! / Wir <b>hatten</b> viel Spaß!</p>\n</div>" },
  { id: "r006", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<table style=\"margin-bottom:10px\">\n<tr><th>Глагол</th><th>Когда используется</th><th>Пример</th></tr>\n<tr><td><b>wissen</b></td><td>знать факт / информацию</td><td>Ich weiß, wo er wohnt.</td></tr>\n<tr><td><b>kennen</b></td><td>знать человека / быть знакомым</td><td>Ich kenne ihn gut.</td></tr>\n</table>\n<p style=\"font-size:12px;font-weight:600;margin-bottom:8px\">Спряжение wissen (неправильный!):</p>\n<div class=\"two-col\">\n<table class=\"conj-table\">\n<tr><td>ich</td><td>weiß</td></tr><tr><td>er/sie/es</td><td>weiß</td></tr><tr><td>ihr</td><td>wisst</td></tr>\n</table>\n<table class=\"conj-table\">\n<tr><td>du</td><td>weißt</td></tr><tr><td>wir</td><td>wissen</td></tr><tr><td>sie/Sie</td><td>wissen</td></tr>\n</table>\n</div>\n</div>" },
  { id: "r007", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-size:13px;margin-bottom:10px\"><b>sich</b> = себя / себе. Используется в возвратных глаголах, когда действие направлено на самого субъекта.</p>\n<table>\n<tr><th>Лицо</th><th>Возвратное</th><th>Пример (sich vorstellen)</th></tr>\n<tr><td>ich</td><td>mich</td><td>Ich stelle <b>mich</b> vor</td></tr>\n<tr><td>du</td><td>dich</td><td>Du stellst <b>dich</b> vor</td></tr>\n<tr><td>er / sie / es</td><td><b>sich</b></td><td>Er stellt <b>sich</b> vor</td></tr>\n<tr><td>wir</td><td>uns</td><td>Wir stellen <b>uns</b> vor</td></tr>\n<tr><td>ihr</td><td>euch</td><td>Ihr stellt <b>euch</b> vor</td></tr>\n<tr><td>sie / Sie</td><td><b>sich</b></td><td>Sie stellen <b>sich</b> vor</td></tr>\n</table>\n</div>" },
  { id: "r008", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-size:13px\">\nВ предложениях с <b>модальным глаголом (Modalverb)</b> и <b>смысловым глаголом (Infinitiv)</b> используется особый порядок слов:\n</p>\n<table style=\"margin-top:10px\">\n<tr>\n<th>Элемент</th>\n<th>Позиция в предложении</th>\n<th>Пример</th>\n</tr>\n<tr>\n<td>Modalverb (спрягаемый глагол)</td>\n<td>2-я позиция</td>\n<td>Ich <b>kann</b> ...</td>\n</tr>\n<tr>\n<td>Infinitiv (основной глагол)</td>\n<td>В конце предложения</td>\n<td>... den Raum <b>vorbereiten</b>.</td>\n</tr>\n</table>\n<p style=\"font-size:13px; margin-top:10px\">\n👉 <b>Разделяемые глаголы (trennbare Verben)</b> в предложениях с Modalverb + Infinitiv <b>не разделяются</b> и остаются в конце предложения целиком.\n</p>\n<p style=\"font-size:13px; margin-top:10px\">\n<b>Пример:</b> Ich kann am Freitag den Raum <b><span style=\"color:var(--accent-red)\">vor</span><span style=\"color:var(--accent-blue)\">bereiten</span></b>.\n</p>\n</div>" },
  { id: "r009", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<table class=\"conj-table\">\n<tbody>\n<tr><th>Лицо</th><th>Окончание</th><th>Пример (machen)</th></tr>\n<tr><td>ich</td><td>+e</td><td>ich mache</td></tr>\n<tr><td>du</td><td>+st</td><td>du machst</td></tr>\n<tr><td>er / sie / es</td><td>+t</td><td>er macht</td></tr>\n<tr><td>wir</td><td>+en</td><td>wir machen</td></tr>\n<tr><td>ihr</td><td>+t</td><td>ihr macht</td></tr>\n<tr><td>sie (Pl) / Sie</td><td>+en</td><td>sie machen</td></tr>\n</tbody>\n</table>\n</div>" },
  { id: "r010", title: "Nominativ - Wer? Was? (кто? что?)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<h3>Nominativ - Wer? Was? (кто? что?)</h3>\n<p style=\"font-size:13px;margin-bottom:8px\">Подлежащее. Кто/что совершает действие.</p>\n<table><tbody><tr><th></th><th>m</th><th>f</th><th>n</th><th>Pl</th></tr>\n<tr><td>опр.</td><td>der</td><td>die</td><td>das</td><td>die</td></tr>\n<tr><td>неопр.</td><td>ein</td><td>eine</td><td>ein</td><td>-</td></tr></tbody></table>\n</div>" },
  { id: "r011", title: "Akkusativ - Wen? Was? (кого? что?)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<h3>Akkusativ - Wen? Was? (кого? что?)</h3>\n<p style=\"font-size:13px;margin-bottom:8px\">Прямое дополнение. Меняется только m: der→den, ein→einen.</p>\n<table><tbody><tr><th></th><th>m</th><th>f</th><th>n</th><th>Pl</th></tr>\n<tr><td>опр.</td><td>den</td><td>die</td><td>das</td><td>die</td></tr>\n<tr><td>неопр.</td><td>einen</td><td>eine</td><td>ein</td><td>-</td></tr></tbody></table>\n</div>" },
  { id: "r012", title: "Dativ - Wem? (кому?)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<h3>Dativ - Wem? (кому?)</h3>\n<p style=\"font-size:13px;margin-bottom:8px\">Используется с предлогами mit, bei, beim и др.</p>\n<table><tbody><tr><th></th><th>m</th><th>f</th><th>n</th><th>Pl</th></tr>\n<tr><td>опр.</td><td>dem</td><td>der</td><td>dem</td><td>den</td></tr>\n<tr><td>неопр.</td><td>einem</td><td>einer</td><td>einem</td><td>-</td></tr></tbody></table>\n</div>" },
  { id: "r013", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-size:13px\">Если используется артикль (der/die/das/den...) - речь идёт конкретно про это существительное. Если не используется - речь об обобщённом.</p>\n<table style=\"margin-top:10px\">\n<tr><th>Немецкий</th><th>Перевод</th></tr>\n<tr><td>Mögen Sie Fisch?</td><td>Вам нравится рыба? (вообще)</td></tr>\n<tr><td>Mögen Sie den Fisch?</td><td>Вам нравится эта рыба? (конкретная)</td></tr>\n</table>\n</div>" },
  { id: "r014", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-size:12px;margin-bottom:10px\">sein = его (er), ihr = её (sie). Окончания как у mein/meine.</p>\n<table>\n<tr><th>Существительное</th><th>ich</th><th>er (sein)</th><th>sie (ihr)</th></tr>\n<tr><td>der Beruf (m)</td><td>mein Beruf</td><td style=\"color:var(--accent-blue)\">sein Beruf</td><td style=\"color:var(--accent-red)\">ihr Beruf</td></tr>\n<tr><td>das Alter (n)</td><td>mein Alter</td><td style=\"color:var(--accent-blue)\">sein Alter</td><td style=\"color:var(--accent-red)\">ihr Alter</td></tr>\n<tr><td>die Augenfarbe (f)</td><td>meine Augenfarbe</td><td style=\"color:var(--accent-blue)\">seine Augenfarbe</td><td style=\"color:var(--accent-red)\">ihre Augenfarbe</td></tr>\n<tr><td>die Hobbys (Pl)</td><td>meine Hobbys</td><td style=\"color:var(--accent-blue)\">seine Hobbys</td><td style=\"color:var(--accent-red)\">ihre Hobbys</td></tr>\n</table>\n<div style=\"background:var(--tip-bg);border-left:4px solid var(--tip-border);padding:10px;margin-top:10px;border-radius:4px;font-weight:600;font-size:13px;\">\n⚡ m/n → mein/sein/ihr  |  f/Pl → meine/seine/ihre\n</div>\n</div>" },
  { id: "r015", title: "Partizip II: правило приставки ge-", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<h3>Partizip II: правило приставки ge-</h3>\n<table>\n<tbody><tr><th>Инфинитив</th><th>Partizip II</th><th>Перевод</th></tr>\n<tr><td>öffnen</td><td>geöffnet</td><td>открытый</td></tr>\n<tr><td>schließen</td><td>geschlossen</td><td>закрытый</td></tr>\n<tr><td>machen</td><td>gemacht</td><td>сделанный</td></tr>\n</tbody></table>\n<div class=\"warning\" style=\"margin-top:10px\">⚠ <b>ge- НЕ добавляется в двух случаях:</b><br/>\n1. Глаголы с неотделяемой приставкой (be-, er-, ver-, ent-, zer-): <b>besuchen → besucht</b>, verstehen → verstanden<br/>\n2. Глаголы на <b>-ieren</b>: organisieren → <b>organisiert</b>, fotografieren → fotografiert\n</div>\n</div>" },
  { id: "r016", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-size:12px;margin-bottom:8px\">Глагол меняется по лицу, gern остаётся неизменным</p>\n<table>\n<tbody>\n<tr><th>Пример</th><th>Перевод</th></tr>\n<tr><td>Er kocht gern</td><td>Он любит готовить</td></tr>\n<tr><td>Sie malt gern</td><td>Она любит рисовать</td></tr>\n<tr><td>Ich singe gern</td><td>Я люблю петь</td></tr>\n</tbody>\n</table>\n</div>" },
  { id: "r017", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-size:13px;margin-bottom:10px\"><b>Wohin?</b> (куда?) — вопрос о направлении движения. Используется <b>in + Akkusativ</b>.</p>\n<table>\n<tr><th>Артикль</th><th>+ in</th><th>Пример</th></tr>\n<tr><td>der (m)</td><td>in <b>den</b></td><td>Ich gehe <b>in den Park</b> — иду в парк</td></tr>\n<tr><td>das (n)</td><td>in <b>das</b> = <b>ins</b></td><td>Ich gehe <b>ins Kino</b> — иду в кино</td></tr>\n<tr><td>die (f)</td><td>in <b>die</b></td><td>Ich gehe <b>in die Kneipe</b> — иду в паб</td></tr>\n</table>\n<p style=\"font-size:12px;margin-top:8px\">💡 <b>in + das = ins</b> (слитная форма) | <b>in + dem = im</b> (для Wo? — где?)<br/>\n⚠ Различай: <b>Wohin?</b> → Akkusativ (in den, ins, in die) | <b>Wo?</b> → Dativ (im, im, in der)</p>\n</div>" },
  { id: "r018", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<table>\n<tr><th></th><th>sollen</th><th>müssen</th></tr>\n<tr><td>Источник</td><td>внешний — кто-то сказал / так положено</td><td>внутренний / объективный — сам так решил или иначе нельзя</td></tr>\n<tr><td>Пример</td><td>Du <b>sollst</b> nicht rauchen<br/>(тебе говорят, что нельзя)</td><td>Ich <b>muss</b> schlafen<br/>(сам устал, надо)</td></tr>\n<tr><td>Ещё</td><td>Ich <b>soll</b> Milch kaufen<br/>(мама попросила)</td><td>Ich <b>muss</b> Milch kaufen<br/>(дома кончилось)</td></tr>\n</table>\n<p style=\"font-size:12px;margin-top:8px\">💡 Грубо: <b>sollen</b> — «надо для кого-то» | <b>müssen</b> — «надо мне / по сути»</p>\n</div>" },
  { id: "r019", title: "(no title)", topic: "rules:grammar", level: "A1", html: "<div class=\"rule-box\">\n<p style=\"font-size:13px;margin-bottom:10px\">Прилагательное в словаре стоит <b>без окончания</b> (groß, schön, nächst, gut). Но <b>перед существительным</b> оно ВСЕГДА получает окончание — зависит от рода, числа и падежа.</p>\n<p style=\"font-size:13px;font-weight:600;margin:10px 0 6px\">📍 Две позиции прилагательного:</p>\n<table style=\"margin-bottom:12px\">\n<tr><th>Позиция</th><th>Окончание</th><th>Пример</th></tr>\n<tr><td>После sein / werden / bleiben</td><td>❌ нет окончания</td><td>Das Haus ist <b>groß</b> | Er bleibt <b>gesund</b></td></tr>\n<tr><td>Перед существительным</td><td>✅ есть окончание</td><td>ein <b>großes</b> Haus | der <b>gesunde</b> Mann</td></tr>\n</table>\n<p style=\"font-size:13px;font-weight:600;margin:10px 0 6px\">📍 Окончания после <b>определённого артикля</b> (der/die/das):</p>\n<table style=\"margin-bottom:12px\">\n<tr><th>Падеж</th><th>m (der)</th><th>f (die)</th><th>n (das)</th><th>Pl (die)</th></tr>\n<tr><td>Nom</td><td>-e</td><td>-e</td><td>-e</td><td>-en</td></tr>\n<tr><td>Akk</td><td><b>-en</b></td><td>-e</td><td>-e</td><td>-en</td></tr>\n<tr><td>Dat</td><td>-en</td><td>-en</td><td>-en</td><td>-en</td></tr>\n</table>\n<p style=\"font-size:13px;font-weight:600;margin:10px 0 6px\">📍 Примеры с <b>nächst</b> (следующий):</p>\n<table style=\"margin-bottom:8px\">\n<tr><th>Падеж / Род</th><th>Форма</th><th>Перевод</th></tr>\n<tr><td>f, Nom/Akk</td><td>nächst<b>e</b> Woche</td><td>следующая неделя / на следующей неделе</td></tr>\n<tr><td>m, Akk</td><td>nächst<b>en</b> Montag</td><td>в следующий понедельник</td></tr>\n<tr><td>n, Nom/Akk</td><td>nächst<b>es</b> Jahr</td><td>следующий год</td></tr>\n<tr><td>Dat (любой род)</td><td>im nächst<b>en</b> Jahr</td><td>в следующем году</td></tr>\n</table>\n<p style=\"font-size:12px;margin-top:8px\">💡 Простое правило: <b>в Dativ всегда -en</b> | в Akk у m-рода тоже <b>-en</b> | остальное обычно <b>-e</b><br/>\n⚠ Без артикля (неопределённый/нулевой) — окончания немного другие. Это уровень A2+, пока запомни базовый случай.</p>\n</div>" },
  { id: "r020", title: "Отделяемые приставки", topic: "rules:grammar", level: "A1", html: "<div class=\"section\">\n<div class=\"section-title\">Отделяемые приставки</div>\n<table>\n<tbody><tr><th>Приставка</th><th>Значение</th></tr>\n<tr><td>auf-</td><td>вверх / открыто</td></tr>\n<tr><td>an-</td><td>на / у</td></tr>\n<tr><td>ein-</td><td>в / внутрь</td></tr>\n<tr><td>aus-</td><td>снаружи / выключено</td></tr>\n<tr><td>mit-</td><td>с (вместе)</td></tr>\n<tr><td>vor-</td><td>перед / от</td></tr>\n<tr><td>ab-</td><td>от / закрыто</td></tr>\n<tr><td>zu-</td><td>к / навстречу</td></tr>\n<tr><td>fern-</td><td>вдали / удалённый</td></tr>\n<tr><td>weg-</td><td>прочь</td></tr>\n<tr><td>zurück-</td><td>назад / обратно</td></tr>\n</tbody></table>\n</div>" },
  { id: "r021", title: "Суффикс -lich — образование прилагательных", topic: "rules:new", level: "A1", new: true, html: "<div class=\"rule-box\">\n<h3>Суффикс <b>-lich</b> — образование прилагательных</h3>\n<p style=\"font-size:13px;margin-bottom:10px\">Суффикс <b>-lich</b> превращает существительное в прилагательное со значением «относящийся к / похожий на». Похож на русский суффикс «-ный».</p>\n<table>\n<tr><th>Существительное</th><th>+ -lich</th><th>Перевод</th></tr>\n<tr><td>das Herz (сердце)</td><td>herz<b>lich</b></td><td>сердечный</td></tr>\n<tr><td>der Tag (день)</td><td>täg<b>lich</b></td><td>ежедневный</td></tr>\n<tr><td>der Freund (друг)</td><td>freund<b>lich</b></td><td>дружелюбный</td></tr>\n<tr><td>der Mensch (человек)</td><td>mensch<b>lich</b></td><td>человеческий</td></tr>\n<tr><td>der Monat (месяц)</td><td>monat<b>lich</b></td><td>ежемесячный</td></tr>\n<tr><td>der Beruf (профессия)</td><td>beruf<b>lich</b></td><td>профессиональный</td></tr>\n</table>\n<p style=\"font-size:12px;margin-top:8px\">💡 Часто корневая гласная меняется на умлаут: Tag → t<b>ä</b>glich, Nacht → n<b>ä</b>chtlich</p>\n</div>" },
];

// УПРАВЛЕНИЕ ТЕМОЙ (хук)
// ═══════════════════════════════════════════════════════════════
function useTheme() {
  const [theme, setTheme] = useState(() => {
    try {
      return localStorage.getItem("trainer-theme") || "auto";
    } catch (e) {
      return "auto";
    }
  });
  useEffect(() => {
    document.documentElement.classList.remove("theme-auto", "theme-light", "theme-dark");
    document.documentElement.classList.add("theme-" + theme);
    try {
      localStorage.setItem("trainer-theme", theme);
    } catch (e) {}
  }, [theme]);
  function cycleTheme() {
    setTheme((t) => (t === "auto" ? "light" : t === "light" ? "dark" : "auto"));
  }
  const icon = theme === "auto" ? "🌓" : theme === "light" ? "☀️" : "🌙";
  return { theme, cycleTheme, icon };
}

// ═══════════════════════════════════════════════════════════════
// АВТОГЕНЕРАЦИЯ ВОПРОСОВ
// ═══════════════════════════════════════════════════════════════
// Источник: VOCAB, CONJUGATIONS из data.js
// Уровни:
//   1 — перевод DE→RU, RU→DE (mc)
//   2 — артикль для noun (mc), спряжение Präsens regelmäßig (mc)
//   3 — спряжение unregelmäßig (fill), plural (fill), артикль в Nom предложении (mc)
//   4 — tiles (из QUESTIONS) — авто-генерации нет, берём только ручные
//   5 — рукописные ответы (из QUESTIONS, пока пусто)

// ─── Хелперы для форматирования noun ────────────────────────────────────────
function formatNounFull(item) {
  // "der Tisch — die Tische" или "die Frau — die Frauen"
  // Если plural есть — добавляем; если нет — только de
  if (item.plural) return `${item.de} — ${item.plural}`;
  return item.de;
}

function nounStem(article_de) {
  // "der Tisch" → "Tisch"
  return article_de.replace(/^(der |die |das )/, "");
}

// ─── Спряжение regelmäßig ──────────────────────────────────────────────────
function conjRegelmaessig(infinitive, pronoun) {
  // Возвращает форму глагола для местоимения
  // pronoun: "ich" | "du" | "er" | "wir" | "ihr" | "sie"
  let stem = infinitive.replace(/en$/, "").replace(/n$/, "");

  // Глагол с -t/-d в основе → вставка -e- для du/er/ihr
  const needsE = /[td]$/.test(stem);
  // Глагол с -s/-ß/-z/-x в основе → у du только -t вместо -st
  const sibilantEnd = /[sßzx]$/.test(stem);

  switch (pronoun) {
    case "ich": return stem + "e";
    case "du":
      if (sibilantEnd) return stem + "t";
      if (needsE) return stem + "est";
      return stem + "st";
    case "er":
    case "sie":  // 3.л. ед. (контекст — она)
    case "es":
      if (needsE) return stem + "et";
      return stem + "t";
    case "wir": return stem + "en";
    case "ihr":
      if (needsE) return stem + "et";
      return stem + "t";
    case "Sie":
    case "sie_pl":
      return stem + "en";
    default: return stem + "en";
  }
}

// Получить спряжение глагола: сначала проверка в CONJUGATIONS, потом regelmäßig
function getConjForm(infinitive, pronounIdx, conjugations) {
  // pronounIdx: 0=ich, 1=du, 2=er/sie/es, 3=wir, 4=ihr, 5=sie/Sie
  const conj = conjugations.find(c => c.verb === infinitive);
  if (conj && conj.forms && conj.forms[pronounIdx]) {
    return conj.forms[pronounIdx];
  }
  const pronouns = ["ich", "du", "er", "wir", "ihr", "sie_pl"];
  return conjRegelmaessig(infinitive, pronouns[pronounIdx]);
}

// ─── Генератор: Ур 1 — перевод DE→RU ─────────────────────────────────────
function genL1_translate_DE_RU(item, vocabPool) {
  // Дистракторы: 3 случайных слова того же pos с другим переводом
  const samePos = vocabPool.filter(v =>
    v.pos === item.pos && v.id !== item.id && v.ru !== item.ru
  );
  if (samePos.length < 3) return null;
  const distractors = shuffle(samePos).slice(0, 3).map(v => v.ru);

  const de = item.pos === "noun" ? formatNounFull(item) : item.de;
  const opts = shuffle([item.ru, ...distractors]);
  const ans = opts.indexOf(item.ru);

  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Переведи: «${de}»`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 1 — перевод RU→DE ─────────────────────────────────────
function genL1_translate_RU_DE(item, vocabPool) {
  const samePos = vocabPool.filter(v =>
    v.pos === item.pos && v.id !== item.id && v.de !== item.de
  );
  if (samePos.length < 3) return null;
  const distractors = shuffle(samePos).slice(0, 3).map(v =>
    v.pos === "noun" ? formatNounFull(v) : v.de
  );
  const correct = item.pos === "noun" ? formatNounFull(item) : item.de;
  const opts = shuffle([correct, ...distractors]);
  const ans = opts.indexOf(correct);

  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Как сказать «${item.ru}»?`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — артикль (для noun) ─────────────────────────────────
function genL2_article(item) {
  if (item.pos !== "noun" || !item.gender || item.gender === "pl") return null;
  const articleMap = { m: "der", f: "die", n: "das" };
  const correct = articleMap[item.gender];
  if (!correct) return null;
  const stem = nounStem(item.de);

  const opts = ["der", "die", "das"];
  const ans = opts.indexOf(correct);

  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Какой артикль? «___ ${stem}»`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — спряжение Präsens regelmäßig (mc) ──────────────────
const PRONOUNS_DISPLAY = ["ich", "du", "er", "wir", "ihr", "sie"];

function genL2_conj_regelmaessig(item, vocabPool, conjugations) {
  if (item.pos !== "verb") return null;
  // Пропускаем глаголы которые есть в CONJUGATIONS — они unregelmäßig (это Ур 3)
  if (conjugations.find(c => c.verb === item.de)) return null;
  // Пропускаем модальные/возвратные/составные (с пробелами)
  if (item.de.includes(" ")) return null;

  // Берём случайное местоимение (не "ich" - оно тривиальное, и не "wir/sie" - одинаковые)
  const pronounIdx = [1, 2, 4][Math.floor(Math.random() * 3)]; // du / er / ihr
  const correctForm = getConjForm(item.de, pronounIdx, conjugations);

  // Дистракторы: формы того же глагола для других местоимений
  const allForms = [0, 1, 2, 3, 4, 5].map(i => getConjForm(item.de, i, conjugations));
  const wrongForms = [...new Set(allForms.filter(f => f !== correctForm))];
  if (wrongForms.length < 3) return null;
  const distractors = shuffle(wrongForms).slice(0, 3);

  const opts = shuffle([correctForm, ...distractors]);
  const ans = opts.indexOf(correctForm);

  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Спряги «${item.de}» для «${PRONOUNS_DISPLAY[pronounIdx]}»:`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 3 — plural (fill) ──────────────────────────────────────
function genL3_plural(item) {
  if (item.pos !== "noun" || !item.plural || item.gender === "pl") return null;
  // Игнорируем абстрактные/массовые (без plural)
  return {
    auto: true, level: "A2", difficulty: 3, type: "fill",
    q: `Множественное число от «${item.de}»?`,
    ans: item.plural,
    altAns: [item.plural.replace(/^die /, "")],
    hint: "die ...",
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 3 — спряжение unregelmäßig (fill) ──────────────────────
function genL3_conj_unregel(conj) {
  // Случайное местоимение из доступных
  const pronounIdx = Math.floor(Math.random() * conj.pronouns.length);
  const pronoun = conj.pronouns[pronounIdx];
  const correctForm = conj.forms[pronounIdx];

  return {
    auto: true, level: "A2", difficulty: 3, type: "fill",
    q: `Спряги «${conj.verb}» для «${pronoun}»:`,
    ans: correctForm,
    altAns: [],
    hint: conj.modal ? "модальный" : "Präsens",
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 1 — перевод глагола DE→RU ──────────────────────────
function genL1_unregel_translate_DE_RU(conj, allConjugations) {
  if (!conj.ru) return null;
  const distractors = allConjugations
    .filter(c => c.id !== conj.id && c.ru && c.ru !== conj.ru)
    .map(c => c.ru);
  if (distractors.length < 3) return null;
  const opts = shuffle([conj.ru, ...shuffle(distractors).slice(0, 3)]);
  const ans = opts.indexOf(conj.ru);
  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Переведи: «${conj.verb}»`,
    opts, ans,
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 1 — перевод глагола RU→DE ──────────────────────────
function genL1_unregel_translate_RU_DE(conj, allConjugations) {
  if (!conj.ru) return null;
  const distractors = allConjugations
    .filter(c => c.id !== conj.id && c.verb !== conj.verb)
    .map(c => c.verb);
  if (distractors.length < 3) return null;
  const opts = shuffle([conj.verb, ...shuffle(distractors).slice(0, 3)]);
  const ans = opts.indexOf(conj.verb);
  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Как сказать «${conj.ru}»?`,
    opts, ans,
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 2 — fill на одну форму ─────────────────────────────
function genL2_unregel_one_form(conj) {
  const pronounIdx = Math.floor(Math.random() * conj.pronouns.length);
  const pronoun = conj.pronouns[pronounIdx];
  const correctForm = conj.forms[pronounIdx];
  return {
    auto: true, level: "A1", difficulty: 2, type: "fill",
    q: `${pronoun} ___ (${conj.verb}${conj.ru ? " — " + conj.ru : ""})`,
    ans: correctForm,
    altAns: [],
    hint: `${conj.verb} в Präsens`,
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 3 — conj на все 6 форм ─────────────────────────────
function genL3_unregel_full_conj(conj) {
  return {
    auto: true, level: "A2", difficulty: 3, type: "conj",
    q: `Проспрягай «${conj.verb}»${conj.ru ? " — " + conj.ru : ""} в Präsens:`,
    verb: conj.verb,
    tense: "Präsens",
    pronouns: conj.pronouns,
    ans: conj.forms,
    sourceId: conj.id,
  };
}

// ─── Сборка пула вопросов для блока unregel ──────────────────────────────
function buildUnregelQuestions(conjugations) {
  const pool = [];
  for (const c of conjugations) {
    const q1a = genL1_unregel_translate_DE_RU(c, conjugations);
    if (q1a) pool.push(q1a);
    const q1b = genL1_unregel_translate_RU_DE(c, conjugations);
    if (q1b) pool.push(q1b);
    pool.push(genL2_unregel_one_form(c));
    pool.push(genL3_unregel_full_conj(c));
  }
  return pool;
}

// ─── Главная функция: собрать пул автогенерированных вопросов для топиков ──
function buildAutoQuestions(topics, vocab, conjugations) {
  // Берём слова из заданных topics
  const items = vocab.filter(v => v.topics.some(t => topics.includes(t)));
  if (items.length === 0) return [];

  const pool = [];

  // Ур 1: для каждого слова — DE→RU и RU→DE
  for (const item of items) {
    const q1 = genL1_translate_DE_RU(item, vocab);
    if (q1) pool.push(q1);
    const q2 = genL1_translate_RU_DE(item, vocab);
    if (q2) pool.push(q2);
  }

  // Ур 2: артикли для noun, спряжение для verb
  for (const item of items) {
    const qa = genL2_article(item);
    if (qa) pool.push(qa);
    const qc = genL2_conj_regelmaessig(item, vocab, conjugations);
    if (qc) pool.push(qc);
  }

  // Ур 3: plural + unregel
  for (const item of items) {
    const qp = genL3_plural(item);
    if (qp) pool.push(qp);
  }
  // Ур 3 unregel: только для глаголов которые есть и в этом топике, и в CONJUGATIONS
  const verbsInTopic = items.filter(v => v.pos === "verb");
  for (const v of verbsInTopic) {
    const conj = conjugations.find(c => c.verb === v.de);
    if (conj) {
      const qu = genL3_conj_unregel(conj);
      if (qu) pool.push(qu);
    }
  }

  return pool;
}

// ─── Сборщик тестовой сессии: 30 вопросов по пропорции 8/7/6/5/4 ──────────
function buildTestSession(topics, vocab, conjugations, manualQuestions, blockId) {
  // Пропорции по уровням
  const QUOTA = { 1: 8, 2: 7, 3: 6, 4: 5, 5: 4 };

  // Особый блок: unregel — используем собственный пул вопросов по CONJUGATIONS
  let autoPool;
  if (blockId === "unregel") {
    autoPool = buildUnregelQuestions(conjugations);
  } else {
    autoPool = buildAutoQuestions(topics, vocab, conjugations);
  }

  // 2. Ручные вопросы из QUESTIONS, привязанные к этому блоку или сабблоку
  const trainerTopic = `trainer:${blockId}`;
  const manualPool = manualQuestions.filter(q => q.topic === trainerTopic);

  // 3. Объединяем пулы по уровням
  const byLevel = { 1: [], 2: [], 3: [], 4: [], 5: [] };
  for (const q of [...autoPool, ...manualPool]) {
    const lvl = q.difficulty || 1;
    if (byLevel[lvl]) byLevel[lvl].push(q);
  }

  // 4. Семплим по квоте, добирая из соседних уровней если не хватает
  const session = [];
  const used = new Set();
  for (const lvl of [1, 2, 3, 4, 5]) {
    const want = QUOTA[lvl];
    const pool = shuffle(byLevel[lvl].filter(q => !used.has(q)));
    const take = pool.slice(0, want);
    take.forEach(q => used.add(q));
    session.push(...take);
  }
  // Добор: если не наскребли 30 — добираем из любого пула
  if (session.length < 30) {
    const allRest = shuffle([...autoPool, ...manualPool].filter(q => !used.has(q)));
    session.push(...allRest.slice(0, 30 - session.length));
  }

  // Перемешиваем MC опции и общий порядок
  return shuffleMC(session);
}

// КОМПОНЕНТ: ГЛАВНЫЙ APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const { theme, cycleTheme, icon } = useTheme();

  // ─── Состояние навигации ─────────────────────────────────────────────────
  // Фазы: home | select-block | select-subblock | block-start
  //       | learn-cards | learn-test | test-quiz | results
  const [phase, setPhase] = useState("home");
  const [mode, setMode] = useState(null);  // 'learn' | 'test'
  const [activeBlock, setActiveBlock] = useState(null);
  const [activeSub, setActiveSub] = useState(null);

  // ─── Карточки ───────────────────────────────────────────────────────────
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);

  // ─── Тест ───────────────────────────────────────────────────────────────
  const [questions, setQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [userAns, setUserAns] = useState("");
  const [answered, setAnswered] = useState(false);
  const [correctCount, setCorrectCount] = useState(0);
  const [hintVisible, setHintVisible] = useState(false);
  const [tiles, setTiles] = useState([]);
  const [chosen, setChosen] = useState([]);
  const [conjAnswers, setConjAnswers] = useState([]);

  // ─── Вычисляемые ────────────────────────────────────────────────────────
  function getActiveTopics() {
    if (!activeBlock) return [];
    if (activeBlock.kind) return [];
    if (activeSub) return activeSub.topics;
    if (activeBlock.subblocks) return activeBlock.subblocks.flatMap(s => s.topics);
    return [];
  }
  function getActiveVocab() {
    const topics = getActiveTopics();
    if (topics.length === 0) return [];
    return VOCAB.filter(v => v.topics.some(t => topics.includes(t)));
  }
  function blockHasSubblocks(b) { return b && b.subblocks && b.subblocks.length > 0; }
  function countWords(topics) {
    return VOCAB.filter(v => v.topics.some(t => topics.includes(t))).length;
  }
  function countQuestions(topics, blockId) {
    const items = VOCAB.filter(v => v.topics.some(t => topics.includes(t)));
    let count = items.length * 2;
    count += items.filter(v => v.pos === 'noun' && v.gender && v.gender !== 'pl').length;
    count += items.filter(v => v.pos === 'verb').length;
    count += items.filter(v => v.pos === 'noun' && v.plural && v.gender !== 'pl').length;
    const manual = QUESTIONS.filter(q => q.topic === `trainer:${blockId}`);
    count += manual.length;
    return Math.min(count, 30);
  }

  // ─── Действия навигации ─────────────────────────────────────────────────
  function goHome() {
    setPhase("home"); setMode(null); setActiveBlock(null); setActiveSub(null);
  }
  function pickMode(m) {
    setMode(m); setPhase("select-block");
  }
  function pickBlock(b) {
    setActiveBlock(b);
    if (b.kind === "conjugations") {
      // unregel-блок: свой поток
      if (mode === "test") {
        startTestUnregel();
      } else {
        // learn → сразу карточки спряжений
        startLearnConj();
      }
      return;
    }
    if (b.kind) {
      alert("Блок «" + b.label + "» — пока только в шпоре. В тренажёре появится позже.");
      return;
    }
    if (blockHasSubblocks(b)) setPhase("select-subblock");
    else pickAction(null);
  }

  function startLearnConj() {
    setCardIdx(0);
    setFlipped(false);
    setPhase("learn-conj-cards");
  }

  function startTestUnregel() {
    const session = buildTestSession([], VOCAB, CONJUGATIONS, QUESTIONS, "unregel");
    setQuestions(session); setQIdx(0); setUserAns(""); setAnswered(false);
    setCorrectCount(0); setHintVisible(false); setTiles([]); setChosen([]); setConjAnswers([]);
    setPhase("test-quiz");
  }
  function pickSub(s) {
    setActiveSub(s);
    pickAction(s);
  }
  function pickAction(sub) {
    if (mode === "test") startTest(sub);
    else setPhase("block-start");
  }
  function startTestAll() {
    setActiveSub(null);
    startTest(null);
  }
  function startTest(sub) {
    const topics = sub ? sub.topics
      : (activeBlock.subblocks ? activeBlock.subblocks.flatMap(s => s.topics) : []);
    const blockId = sub ? `${activeBlock.id}:${sub.id}` : activeBlock.id;
    const session = buildTestSession(topics, VOCAB, CONJUGATIONS, QUESTIONS, blockId);
    setQuestions(session); setQIdx(0); setUserAns(""); setAnswered(false);
    setCorrectCount(0); setHintVisible(false); setTiles([]); setChosen([]); setConjAnswers([]);
    setPhase("test-quiz");
  }
  function startLearnCards() {
    setCardIdx(0); setFlipped(false); setPhase("learn-cards");
  }
  function startLearnMiniTest() {
    const vocab = getActiveVocab();
    const session = vocab.slice(0, 10)
      .map(item => genL1_translate_DE_RU(item, VOCAB)).filter(Boolean);
    setQuestions(shuffleMC(session)); setQIdx(0); setUserAns(""); setAnswered(false);
    setCorrectCount(0); setTiles([]); setChosen([]);
    setPhase("learn-test");
  }
  function goBackToSubblocks() {
    if (blockHasSubblocks(activeBlock)) { setPhase("select-subblock"); setActiveSub(null); }
    else { setPhase("select-block"); setActiveBlock(null); }
  }

  function nextCard() {
    const vocab = getActiveVocab();
    if (cardIdx + 1 >= vocab.length) startLearnMiniTest();
    else { setCardIdx(cardIdx + 1); setFlipped(false); }
  }
  function prevCard() {
    if (cardIdx > 0) { setCardIdx(cardIdx - 1); setFlipped(false); }
  }

  function submitAnswer(isCorrect) {
    if (isCorrect) setCorrectCount(c => c + 1);
    setAnswered(true);
  }
  function nextQ() {
    if (qIdx + 1 >= questions.length) setPhase("results");
    else {
      setQIdx(qIdx + 1); setUserAns(""); setAnswered(false); setHintVisible(false);
      setChosen([]); setConjAnswers([]);
      const nq = questions[qIdx + 1];
      if (nq && nq.type === "tiles") setTiles(shuffle(nq.words.map((w, i) => ({ w, i }))));
    }
  }

  useEffect(() => {
    const q = questions[qIdx];
    if (q && q.type === "tiles" && tiles.length === 0) {
      setTiles(shuffle(q.words.map((w, i) => ({ w, i }))));
    }
    if (q && q.type === "conj") {
      setConjAnswers(new Array(q.pronouns.length).fill(""));
    }
  }, [qIdx, questions]);

  // ─── Цвета режимов ──────────────────────────────────────────────────────
  const modeColor = mode === "learn" ? "#7c5cbf" : "#1a7a4a";
  const modeLabel = mode === "learn" ? "🧠 Изучение" : "🎯 Тестирование";

  // ─── HOME ──────────────────────────────────────────────────────────────
  function renderHome() {
    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar left={null} right={null} icon={icon} onTheme={cycleTheme} />
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 52, marginBottom: 6 }}>🇩🇪</div>
            <h1 style={S.heading}>Тренажёр немецкого</h1>
            <p style={S.subheading}>Выбери режим</p>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div style={{ ...S.modeCard, borderColor: "#7c5cbf" }}
                 onClick={() => pickMode("learn")}>
              <div style={{ fontSize: 42, marginBottom: 6 }}>🧠</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, color: "var(--text-title)" }}>
                Изучение
              </div>
              <div style={S.muted}>Карточки + мини-тест на перевод</div>
            </div>
            <div style={{ ...S.modeCard, borderColor: "#1a7a4a" }}
                 onClick={() => pickMode("test")}>
              <div style={{ fontSize: 42, marginBottom: 6 }}>🎯</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, color: "var(--text-title)" }}>
                Тестирование
              </div>
              <div style={S.muted}>5 уровней: перевод, артикли, спряжение, плитки</div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ─── SELECT BLOCK ───────────────────────────────────────────────────────
  function renderSelectBlock() {
    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar
            left={<button style={S.outlineBtn("#888")} onClick={goHome}>← Назад</button>}
            right={<span style={S.muted}>{modeLabel}</span>}
            icon={icon} onTheme={cycleTheme} onHome={goHome} />
          <h2 style={{ ...S.heading, textAlign: "center" }}>Выбери блок</h2>
          <div style={S.grid}>
            {BLOCKS.map(b => (
              <div key={b.id}
                   style={{ ...S.card, borderLeft: `4px solid ${b.color}`, cursor: "pointer" }}
                   onClick={() => pickBlock(b)}>
                <div style={S.cardTitle}>{b.label}</div>
                {b.desc && <div style={S.cardDesc}>{b.desc}</div>}
                {blockHasSubblocks(b) && <div style={S.cardMeta}>{b.subblocks.length} тем</div>}
                {b.kind === "conjugations" && (
                  <div style={S.cardMeta}>{CONJUGATIONS.length} глаголов</div>
                )}
                {b.kind && b.kind !== "conjugations" && <div style={{ ...S.cardMeta }}>(только в шпоре)</div>}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ─── SELECT SUBBLOCK ────────────────────────────────────────────────────
  function renderSelectSubblock() {
    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar
            left={
              <button style={S.outlineBtn(activeBlock.color)}
                      onClick={() => { setPhase("select-block"); setActiveBlock(null); }}>
                ← Блоки
              </button>
            }
            right={<span style={S.muted}>{modeLabel}</span>}
            icon={icon} onTheme={cycleTheme} onHome={goHome} />
          <h2 style={{ ...S.heading, textAlign: "center" }}>{activeBlock.label}</h2>
          <p style={{ ...S.subheading, textAlign: "center" }}>Выбери тему</p>

          {mode === "test" && (
            <div style={{ textAlign: "center", marginBottom: 24 }}>
              <button style={S.outlineBtn(activeBlock.color)} onClick={startTestAll}>
                🔥 Тест по всему блоку (без тем)
              </button>
            </div>
          )}

          <div style={S.grid}>
            {activeBlock.subblocks.map(sub => {
              const wc = countWords(sub.topics);
              const qc = countQuestions(sub.topics, `${activeBlock.id}:${sub.id}`);
              return (
                <div key={sub.id}
                     style={{ ...S.card, borderLeft: `4px solid ${activeBlock.color}`, cursor: "pointer" }}
                     onClick={() => pickSub(sub)}>
                  <div style={S.cardTitle}>{sub.label}</div>
                  <div style={S.cardMeta}>
                    {mode === "learn" ? `${wc} слов` : `${qc} заданий`}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ─── BLOCK START (только learn) ─────────────────────────────────────────
  function renderBlockStart() {
    const vocab = getActiveVocab();
    const heading = activeSub ? activeSub.label : activeBlock.label;
    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar
            left={<button style={S.outlineBtn(activeBlock.color)} onClick={goBackToSubblocks}>← Назад</button>}
            right={<span style={S.muted}>{modeLabel}</span>}
            icon={icon} onTheme={cycleTheme} onHome={goHome} />
          <h2 style={{ ...S.heading, textAlign: "center" }}>{heading}</h2>
          <p style={{ ...S.subheading, textAlign: "center" }}>{vocab.length} слов</p>

          <div style={{ display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap", marginTop: 24 }}>
            <button style={{ ...S.bigBtn, background: activeBlock.color }} onClick={startLearnCards}>
              📖 Карточки
            </button>
            <button style={{ ...S.bigBtn, background: "#888" }} onClick={startLearnMiniTest}>
              ⚡ Сразу к мини-тесту
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── LEARN CARDS ────────────────────────────────────────────────────────
  function renderLearnCards() {
    const vocab = getActiveVocab();
    if (vocab.length === 0) {
      return <div style={S.page}><div style={S.container}>Нет слов в этой теме.</div></div>;
    }
    const item = vocab[cardIdx];
    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar
            left={<button style={S.outlineBtn(activeBlock.color)} onClick={() => setPhase("block-start")}>← Назад</button>}
            right={<span style={S.muted}>{cardIdx + 1} / {vocab.length}</span>}
            icon={icon} onTheme={cycleTheme} onHome={goHome} />
          <FlipCard item={item} flipped={flipped} onFlip={() => setFlipped(!flipped)} color={activeBlock.color} />
          <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 20 }}>
            <button style={S.outlineBtn()} onClick={prevCard} disabled={cardIdx === 0}>← Назад</button>
            <button style={S.primaryBtn(activeBlock.color)} onClick={nextCard}>
              {cardIdx + 1 >= vocab.length ? "К мини-тесту →" : "Дальше →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── LEARN CONJ CARDS (для unregel) ─────────────────────────────────────
  function renderLearnConjCards() {
    if (CONJUGATIONS.length === 0) {
      return <div style={S.page}><div style={S.container}>Нет данных по спряжениям.</div></div>;
    }
    const conj = CONJUGATIONS[cardIdx];
    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar
            left={
              <button style={S.outlineBtn(activeBlock.color)}
                      onClick={() => { setPhase("select-block"); setActiveBlock(null); }}>
                ← Блоки
              </button>
            }
            right={<span style={S.muted}>{cardIdx + 1} / {CONJUGATIONS.length}</span>}
            icon={icon} onTheme={cycleTheme} onHome={goHome} />
          <ConjFlipCard conj={conj} flipped={flipped}
                        onFlip={() => setFlipped(!flipped)}
                        color={activeBlock.color} />
          <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 20 }}>
            <button style={S.outlineBtn()} onClick={prevCard} disabled={cardIdx === 0}>← Назад</button>
            <button style={S.primaryBtn(activeBlock.color)}
                    onClick={() => {
                      if (cardIdx + 1 >= CONJUGATIONS.length) {
                        // Конец карточек: возврат к блокам
                        setPhase("select-block");
                        setActiveBlock(null);
                      } else {
                        setCardIdx(cardIdx + 1);
                        setFlipped(false);
                      }
                    }}>
              {cardIdx + 1 >= CONJUGATIONS.length ? "Готово →" : "Дальше →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ─── QUIZ ───────────────────────────────────────────────────────────────
  function renderQuiz() {
    if (questions.length === 0) {
      return (
        <div style={S.page}>
          <div style={S.container}>
            <TopBar
              left={<button style={S.outlineBtn(activeBlock.color)} onClick={goBackToSubblocks}>← Назад</button>}
              right={<span style={S.muted}>{modeLabel}</span>}
              icon={icon} onTheme={cycleTheme} onHome={goHome} />
            <div style={{ textAlign: "center", marginTop: 40 }}>
              <p>Нет вопросов для этого блока.</p>
              <button style={S.primaryBtn(activeBlock.color)} onClick={goBackToSubblocks}>Назад</button>
            </div>
          </div>
        </div>
      );
    }
    const q = questions[qIdx];
    const subLabel = phase === "learn-test"
      ? "Мини-тест на перевод"
      : (activeSub ? activeSub.label : activeBlock.label);

    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar
            left={
              <button style={S.outlineBtn(activeBlock.color)}
                      onClick={phase === "learn-test"
                                 ? () => setPhase("block-start")
                                 : goBackToSubblocks}>
                ← Назад
              </button>
            }
            right={<span style={S.muted}>{qIdx + 1} / {questions.length} · ✓ {correctCount}</span>}
            icon={icon} onTheme={cycleTheme} onHome={goHome} />
          <div style={{ textAlign: "center", color: "var(--text-muted)", fontSize: 13, marginBottom: 12 }}>
            {subLabel}
          </div>
          <div style={S.questionCard}>
            <div style={S.questionMeta}>
              Уровень {q.difficulty || "?"} · {q.type}
              {q.auto && <span style={S.autoBadge}>авто</span>}
            </div>
            <div style={S.questionText}>{q.q}</div>
            {renderAnswerControls(q)}
            {answered && q.explain && (<div style={S.explain}>💡 {q.explain}</div>)}
          </div>
          {answered && (
            <div style={{ textAlign: "center", marginTop: 16 }}>
              <button style={S.primaryBtn(activeBlock.color)} onClick={nextQ}>
                {qIdx + 1 >= questions.length ? "Результат →" : "Дальше →"}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  function renderAnswerControls(q) {
    if (q.type === "mc") {
      return (
        <div style={S.mcOpts}>
          {q.opts.map((opt, i) => (
            <button key={i}
                    style={{ ...S.mcBtn,
                             ...(answered && i === q.ans ? S.mcBtnCorrect : {}),
                             ...(answered && i !== q.ans && +userAns === i ? S.mcBtnWrong : {}) }}
                    disabled={answered}
                    onClick={() => { setUserAns(String(i)); submitAnswer(i === q.ans); }}>
              {opt}
            </button>
          ))}
        </div>
      );
    }
    if (q.type === "fill") {
      return (
        <div>
          <input style={S.input} value={userAns}
                 onChange={e => setUserAns(e.target.value)}
                 disabled={answered}
                 onKeyDown={e => {
                   if (e.key === "Enter" && !answered)
                     submitAnswer(checkFill(userAns, q.ans, q.altAns));
                 }}
                 placeholder="Введи ответ..." />
          {q.hint && (
            <div style={{ marginTop: 8 }}>
              {hintVisible ? (<div style={S.hint}>💡 {q.hint}</div>)
                           : (<button style={S.linkBtn} onClick={() => setHintVisible(true)}>Показать подсказку</button>)}
            </div>
          )}
          {!answered && (
            <div style={{ marginTop: 12, textAlign: "right" }}>
              <button style={S.primaryBtn(activeBlock.color)}
                      onClick={() => submitAnswer(checkFill(userAns, q.ans, q.altAns))}>
                Проверить
              </button>
            </div>
          )}
          {answered && (
            <div style={{ ...S.answerLine,
                          color: checkFill(userAns, q.ans, q.altAns) ? "var(--green)" : "var(--red)" }}>
              Правильно: <b>{q.ans}</b>
            </div>
          )}
        </div>
      );
    }
    if (q.type === "tiles") {
      return (
        <div>
          <div style={S.tilesAns}>
            {chosen.map((c, i) => (
              <span key={i} style={S.tile} onClick={() => {
                if (answered) return;
                setChosen(chosen.filter((_, j) => j !== i));
                setTiles([...tiles, c]);
              }}>{c.w}</span>
            ))}
          </div>
          <div style={S.tilesPool}>
            {tiles.map((t, i) => (
              <span key={i} style={S.tilePool} onClick={() => {
                if (answered) return;
                setChosen([...chosen, t]);
                setTiles(tiles.filter((_, j) => j !== i));
              }}>{t.w}</span>
            ))}
          </div>
          {!answered && chosen.length > 0 && (
            <div style={{ textAlign: "right", marginTop: 12 }}>
              <button style={S.primaryBtn(activeBlock.color)}
                      onClick={() => {
                        const userPhrase = chosen.map(c => c.w).join(" ");
                        const correctPhrase = q.words.join(" ");
                        submitAnswer(normalise(userPhrase) === normalise(correctPhrase));
                      }}>
                Проверить
              </button>
            </div>
          )}
          {answered && (
            <div style={{ ...S.answerLine }}>Правильно: <b>{q.words.join(" ")}</b></div>
          )}
        </div>
      );
    }
    if (q.type === "conj") {
      return (
        <div>
          <table style={S.conjTable}>
            <tbody>
              {q.pronouns.map((p, i) => (
                <tr key={i}>
                  <td style={{ padding: "6px 12px", fontWeight: 600 }}>{p}</td>
                  <td>
                    <input style={S.input} value={conjAnswers[i] || ""}
                           disabled={answered}
                           onChange={e => {
                             const copy = [...conjAnswers]; copy[i] = e.target.value;
                             setConjAnswers(copy);
                           }} />
                  </td>
                  {answered && (
                    <td style={{ padding: "0 8px",
                                 color: normalise(conjAnswers[i]) === normalise(q.ans[i])
                                        ? "var(--green)" : "var(--red)" }}>
                      {normalise(conjAnswers[i]) === normalise(q.ans[i]) ? "✓" : q.ans[i]}
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
          {!answered && (
            <div style={{ textAlign: "right", marginTop: 12 }}>
              <button style={S.primaryBtn(activeBlock.color)}
                      onClick={() => {
                        const allCorrect = q.ans.every((a, i) =>
                          normalise(conjAnswers[i] || "") === normalise(a));
                        submitAnswer(allCorrect);
                      }}>
                Проверить
              </button>
            </div>
          )}
        </div>
      );
    }
    return <div>Неизвестный тип вопроса: {q.type}</div>;
  }

  // ─── RESULTS ────────────────────────────────────────────────────────────
  function renderResults() {
    const pct = Math.round((correctCount / questions.length) * 100);
    return (
      <div style={S.page}>
        <div style={S.container}>
          <TopBar
            left={<button style={S.outlineBtn(activeBlock.color)} onClick={goHome}>← На главную</button>}
            right={<span style={S.muted}>{modeLabel}</span>}
            icon={icon} onTheme={cycleTheme} onHome={goHome} />
          <div style={{ ...S.questionCard, textAlign: "center", padding: 40 }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>
              {pct >= 80 ? "🎉" : pct >= 50 ? "👍" : "💪"}
            </div>
            <div style={{ fontSize: 28, marginBottom: 8, color: "var(--text-title)", fontWeight: 700 }}>
              {correctCount} / {questions.length}
            </div>
            <div style={{ fontSize: 18, color: "var(--text-muted)" }}>{pct}% правильно</div>
            <div style={{ marginTop: 24, display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <button style={S.outlineBtn(activeBlock.color)} onClick={goBackToSubblocks}>К темам</button>
              <button style={S.primaryBtn(activeBlock.color)}
                      onClick={() => { if (mode === "learn") startLearnMiniTest();
                                       else startTest(activeSub); }}>
                Ещё раз →
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ─── MAIN SWITCH ────────────────────────────────────────────────────────
  return (
    <>
      <style>{THEME_CSS}</style>

      {phase === "home" && renderHome()}
      {phase === "select-block" && renderSelectBlock()}
      {phase === "select-subblock" && activeBlock && blockHasSubblocks(activeBlock) && renderSelectSubblock()}
      {phase === "block-start" && activeBlock && renderBlockStart()}
      {phase === "learn-cards" && activeBlock && renderLearnCards()}
      {phase === "learn-conj-cards" && activeBlock && renderLearnConjCards()}
      {(phase === "learn-test" || phase === "test-quiz") && activeBlock && renderQuiz()}
      {phase === "results" && activeBlock && renderResults()}
    </>
  );
}



ReactDOM.render(React.createElement(App), document.getElementById('root'));

</script>

</body>
</html>
