// ═══════════════════════════════════════════════════════════════
// ХЕЛПЕРЫ
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function normalise(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[.!?,;"„“]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
function checkFill(userVal, ans, altAns = []) {
  const u = normalise(userVal);
  if (!u) return false;
  if (u === normalise(ans)) return true;
  return altAns.some((a) => normalise(a) === u);
}
// Сделать MC-вопросы с перетасованными опциями
function shuffleMC(questions) {
  return questions.map((q) => {
    if (q.type !== "mc") return q;
    const indexed = q.opts.map((o, i) => ({ o, correct: i === q.ans }));
    const sh = shuffle(indexed);
    return {
      ...q,
      opts: sh.map((x) => x.o),
      ans: sh.findIndex((x) => x.correct),
    };
  });
}
// Группировка вопросов по уровню + перемешать внутри уровня
function arrangeByLevel(questions) {
  const byLevel = {};
  questions.forEach((q) => {
    const l = q.level;
    if (!byLevel[l]) byLevel[l] = [];
    byLevel[l].push(q);
  });
  return Object.keys(byLevel)
    .sort((a, b) => +a - +b)
    .flatMap((l) => shuffle(byLevel[l]));
}

// ═══════════════════════════════════════════════════════════════
// СОБИРАЕМ БЛОКИ С УЧЁТОМ ДУБЛИРОВАНИЯ «НОВЫЕ» В ТЕМАТИЧЕСКИЕ
// ═══════════════════════════════════════════════════════════════
// Формат поля `also` в neu.vocab:
//   "blockId"           — блок без подкатегорий: добавляем в общий vocab блока
//   "blockId:subId"     — блок с подкатегориями: добавляем в указанный подблок
const BLOCKS = (() => {
  const neu = RAW_BLOCKS.find((b) => b.id === "neu");
  const neuVocab = neu ? neu.vocab : [];

  return RAW_BLOCKS.map((b) => {
    if (b.id === "neu") return b;

    if (b.subblocks) {
      // Блок с подкатегориями
      const newSubblocks = b.subblocks.map((sb) => {
        const target = `${b.id}:${sb.id}`;
        const extras = neuVocab
          .filter((v) => v.also && v.also.includes(target))
          .map((v) => ({ ...v, fromNew: true }));
        return { ...sb, vocab: [...sb.vocab, ...extras] };
      });
      return { ...b, subblocks: newSubblocks };
    } else {
      // Плоский блок
      const extras = neuVocab
        .filter((v) => v.also && v.also.includes(b.id))
        .map((v) => ({ ...v, fromNew: true }));
      return { ...b, vocab: [...b.vocab, ...extras] };
    }
  });
})();

// Хелперы для работы с подблоками
function blockHasSubblocks(block) {
  return Array.isArray(block && block.subblocks) && block.subblocks.length > 0;
}
function getActiveContent(block, subblock) {
  if (!block) return null;
  if (subblock) {
    return {
      vocab: subblock.vocab || [],
      questions: subblock.questions || [],
      label: `${block.label} · ${subblock.label}`,
      shortLabel: subblock.label,
      color: subblock.color || block.color,
    };
  }
  return {
    vocab: block.vocab || [],
    questions: block.questions || [],
    label: block.label,
    shortLabel: block.label,
    color: block.color,
  };
}

// УПРАВЛЕНИЕ ТЕМОЙ (хук)
// ═══════════════════════════════════════════════════════════════
function useTheme() {
  const [theme, setTheme] = useState(() => {
    try {
      return localStorage.getItem("trainer-theme") || "auto";
    } catch (e) {
      return "auto";
    }
  });
  useEffect(() => {
    document.documentElement.classList.remove("theme-auto", "theme-light", "theme-dark");
    document.documentElement.classList.add("theme-" + theme);
    try {
      localStorage.setItem("trainer-theme", theme);
    } catch (e) {}
  }, [theme]);
  function cycleTheme() {
    setTheme((t) => (t === "auto" ? "light" : t === "light" ? "dark" : "auto"));
  }
  const icon = theme === "auto" ? "🌓" : theme === "light" ? "☀️" : "🌙";
  return { theme, cycleTheme, icon };
}

// ═══════════════════════════════════════════════════════════════
// ГЕНЕРАЦИЯ МИНИ-ТЕСТА ПО VOCAB (для режима «Изучение»)
// ═══════════════════════════════════════════════════════════════
function buildVocabQuiz(vocab) {
  // mc-вопросы: половина DE→RU, половина RU→DE
  const items = vocab.slice();
  const questions = [];
  items.forEach((item, idx) => {
    const direction = idx % 2 === 0 ? "de2ru" : "ru2de";
    // Сгенерировать 3 неправильных ответа из других items
    const others = items.filter((_, i) => i !== idx);
    const wrong = shuffle(others).slice(0, 3);
    if (direction === "de2ru") {
      const opts = shuffle([item.ru, ...wrong.map((w) => w.ru)]);
      const ans = opts.indexOf(item.ru);
      questions.push({
        type: "mc",
        q: `Как переводится «${item.de}»?`,
        opts,
        ans,
        explain: item.note || `${item.de} — ${item.ru}`,
      });
    } else {
      const opts = shuffle([item.de, ...wrong.map((w) => w.de)]);
      const ans = opts.indexOf(item.de);
      questions.push({
        type: "mc",
        q: `Как по-немецки «${item.ru}»?`,
        opts,
        ans,
        explain: item.note || `${item.ru} — ${item.de}`,
      });
    }
  });
  return shuffle(questions);
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const { theme, cycleTheme, icon } = useTheme();
  // phase: home | select-block | select-subblock | block-start | learn-cards | learn-test | test-quiz | results
  const [phase, setPhase] = useState("home");
  const [mode, setMode] = useState(null); // 'learn' | 'test'
  const [blockId, setBlockId] = useState(null);
  const [subblockId, setSubblockId] = useState(null);

  // Состояние для изучения (карточек)
  const [cardIdx, setCardIdx] = useState(0);
  const [cardFlipped, setCardFlipped] = useState(false);
  const [shuffledVocab, setShuffledVocab] = useState([]);

  // Состояние для квиза (mc/tiles/fill/conj)
  const [quizQuestions, setQuizQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [answered, setAnswered] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  const [selected, setSelected] = useState(null);
  const [userInput, setUserInput] = useState("");
  const [score, setScore] = useState(0);
  const [history, setHistory] = useState([]);
  // tiles state
  const [tilePool, setTilePool] = useState([]);
  const [tileBuilt, setTileBuilt] = useState([]);
  // conj state
  const [conjInputs, setConjInputs] = useState([]);
  const [conjResults, setConjResults] = useState([]);

  const activeBlock = blockId ? BLOCKS.find((b) => b.id === blockId) : null;
  const activeSubblock =
    activeBlock && subblockId && activeBlock.subblocks
      ? activeBlock.subblocks.find((sb) => sb.id === subblockId)
      : null;
  const content = getActiveContent(activeBlock, activeSubblock);
  const q = quizQuestions[qIdx];
  const total = quizQuestions.length;

  // Подготовка состояния под текущий вопрос
  useEffect(() => {
    if (!q) return;
    setAnswered(false);
    setIsCorrect(false);
    setSelected(null);
    setUserInput("");
    setConjResults([]);
    if (q.type === "tiles") {
      const indices = q.words.map((_, i) => i);
      setTilePool(shuffle(indices));
      setTileBuilt([]);
    }
    if (q.type === "conj") {
      setConjInputs(q.pronouns.map(() => ""));
    }
  }, [qIdx, quizQuestions]);

  // ─── НАВИГАЦИЯ ───
  function goHome() {
    setPhase("home");
    setMode(null);
    setBlockId(null);
    setSubblockId(null);
    resetQuiz();
  }
  function backToBlocks() {
    setBlockId(null);
    setSubblockId(null);
    resetQuiz();
    setPhase("select-block");
  }
  function backToSubblocks() {
    setSubblockId(null);
    resetQuiz();
    setPhase("select-subblock");
  }
  function pickMode(m) {
    setMode(m);
    setPhase("select-block");
  }
  function pickBlock(id) {
    setBlockId(id);
    setSubblockId(null);
    const block = BLOCKS.find((b) => b.id === id);
    if (!block) return;
    if (blockHasSubblocks(block)) {
      setPhase("select-subblock");
    } else {
      // Плоский блок → сразу к стартовому экрану (learn) или к квизу (test)
      enterBlockOrSubblock(block, null);
    }
  }
  function pickSubblock(subId) {
    setSubblockId(subId);
    const block = activeBlock;
    if (!block) return;
    const sb = block.subblocks.find((s) => s.id === subId);
    if (!sb) return;
    enterBlockOrSubblock(block, sb);
  }
  // Что делать после выбора блока/подблока, в зависимости от режима
  function enterBlockOrSubblock(block, subblock) {
    if (mode === "test") {
      const c = getActiveContent(block, subblock);
      startTestQuizFromContent(c);
    } else {
      // mode === 'learn' → block-start с двумя кнопками
      setPhase("block-start");
    }
  }
  function startTestQuizFromContent(c) {
    if (!c) return;
    const arranged = arrangeByLevel(shuffleMC(c.questions || []));
    setQuizQuestions(arranged);
    setQIdx(0);
    setScore(0);
    setHistory([]);
    setPhase("test-quiz");
  }
  function startCards() {
    if (!content) return;
    setShuffledVocab(shuffle(content.vocab));
    setCardIdx(0);
    setCardFlipped(false);
    setPhase("learn-cards");
  }
  function startLearnQuiz() {
    if (!content) return;
    const quiz = buildVocabQuiz(content.vocab);
    setQuizQuestions(quiz);
    setQIdx(0);
    setScore(0);
    setHistory([]);
    setPhase("learn-test");
  }
  function resetQuiz() {
    setQuizQuestions([]);
    setQIdx(0);
    setScore(0);
    setHistory([]);
  }

  // ─── ОБРАБОТЧИКИ ВОПРОСОВ ───
  function handleMC(i) {
    if (answered) return;
    setSelected(i);
    const ok = i === q.ans;
    setIsCorrect(ok);
    setAnswered(true);
    if (ok) setScore((s) => s + 1);
    setHistory((h) => [...h, { q, userAnswer: q.opts[i], isCorrect: ok }]);
  }
  function handleFillSubmit() {
    if (answered) return;
    const ok = checkFill(userInput, q.ans, q.altAns || []);
    setIsCorrect(ok);
    setAnswered(true);
    if (ok) setScore((s) => s + 1);
    setHistory((h) => [...h, { q, userAnswer: userInput || "—", isCorrect: ok }]);
  }
  function handleTileCheck() {
    if (answered) return;
    const built = tileBuilt.map((i) => q.words[i]).join(" ");
    const correct = q.words.join(" ");
    const ok = built === correct;
    setIsCorrect(ok);
    setAnswered(true);
    if (ok) setScore((s) => s + 1);
    setHistory((h) => [...h, { q, userAnswer: built || "—", isCorrect: ok }]);
  }
  function handleConjCheck() {
    if (answered) return;
    const results = conjInputs.map((v, i) => normalise(v) === normalise(q.ans[i]));
    const ok = results.every(Boolean);
    setConjResults(results);
    setIsCorrect(ok);
    setAnswered(true);
    if (ok) setScore((s) => s + 1);
    const ua = q.pronouns.map((p, i) => `${p}: ${conjInputs[i] || "—"}`).join(" / ");
    setHistory((h) => [...h, { q, userAnswer: ua, isCorrect: ok }]);
  }
  function pickTile(id) {
    setTilePool((p) => p.filter((x) => x !== id));
    setTileBuilt((b) => [...b, id]);
  }
  function unpickTile(pos) {
    const id = tileBuilt[pos];
    setTileBuilt((b) => b.filter((_, i) => i !== pos));
    setTilePool((p) => [...p, id]);
  }
  function nextQ() {
    if (qIdx + 1 < total) {
      setQIdx((i) => i + 1);
    } else {
      setPhase("results");
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // РЕНДЕР
  // ═══════════════════════════════════════════════════════════════
  return (
    <>
      <style>{THEME_CSS}</style>

      {/* ─── HOME ─── */}
      {phase === "home" && (
        <div style={S.page}>
          <div style={S.container}>
            <TopBar left={<div />} icon={icon} onTheme={cycleTheme} />
            <div style={{ textAlign: "center", marginBottom: 28 }}>
              <div style={{ fontSize: 52, marginBottom: 6 }}>🇩🇪</div>
              <h1 style={S.h1}>Тренажёр немецкого</h1>
              <p style={S.muted}>Выбери режим</p>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              <div
                style={{ ...S.modeCard, borderColor: "#7c5cbf" }}
                onClick={() => pickMode("learn")}
              >
                <div style={{ fontSize: 42, marginBottom: 6 }}>🧠</div>
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, color: "var(--text-title)" }}>
                  Изучение
                </div>
                <div style={S.muted}>Карточки + мини-тест на перевод</div>
              </div>
              <div
                style={{ ...S.modeCard, borderColor: "#1a7a4a" }}
                onClick={() => pickMode("test")}
              >
                <div style={{ fontSize: 42, marginBottom: 6 }}>🎯</div>
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, color: "var(--text-title)" }}>
                  Тест
                </div>
                <div style={S.muted}>Уровни 1–4: выбор / плитки / fill / спряжение</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ─── SELECT BLOCK ─── */}
      {phase === "select-block" && (
        <div style={S.page}>
          <div style={S.container}>
            <TopBar
              left={
                <button style={S.outlineBtn("#888")} onClick={goHome}>
                  ← Назад
                </button>
              }
              right={
                <span style={S.muted}>
                  {mode === "learn" ? "🧠 Изучение" : "🎯 Тест"}
                </span>
              }
              icon={icon}
              onTheme={cycleTheme}
            />
            <h2 style={S.h2}>Выбери блок</h2>
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))",
                gap: 12,
              }}

              {BLOCKS.map((b) => {
                // Подсчёт для подсказки на карточке
                let vocabCount, qCount, subInfo;
                if (blockHasSubblocks(b)) {
                  vocabCount = b.subblocks.reduce((s, sb) => s + (sb.vocab || []).length, 0);
                  qCount = b.subblocks.reduce((s, sb) => s + (sb.questions || []).length, 0);

                onClick={startLearnQuiz}
              >
                <div style={{ fontSize: 38, marginBottom: 6 }}>⚡</div>
                <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4, color: "var(--text-title)" }}>
                  Сразу к тесту
                </div>
                <div style={S.muted}>Без карточек — сразу тест на перевод</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ─── LEARN: CARDS ─── */}
      {phase === "learn-cards" && activeBlock && content && (
        <div style={S.page}>
          <div style={S.container}>
            <TopBar
              left={
                <button
                  style={S.outlineBtn("#888")}
                  onClick={() => setPhase("block-start")}
                >
                  ← Назад
                </button>
              }
              right={
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button
                    style={{ ...S.outlineBtn(content.color), padding: "5px 10px", fontSize: 12 }}
                    onClick={startLearnQuiz}
                    title="Прервать карточки и сразу перейти к тесту"
                  >
                    ⚡ К тесту
                  </button>
                  <span style={S.muted}>
                    {cardIdx + 1} / {shuffledVocab.length}
                  </span>
                </div>
              }
              icon={icon}
              onTheme={cycleTheme}
            />
            <div style={{ textAlign: "center", marginBottom: 12 }}>
              <span style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 600 }}>
                {content.label}
              </span>
            </div>
            <div
              style={{
                height: 4,
                background: "var(--border-soft)",
                borderRadius: 2,
                marginBottom: 18,
              }}
            >
              <div
                style={{
                  height: 4,
                  background: content.color,
                  borderRadius: 2,
                  width: `${((cardIdx + 1) / shuffledVocab.length) * 100}%`,
                  transition: "width 0.3s",
                }}
              />
            </div>
            {shuffledVocab[cardIdx] && (
              <FlipCard
                item={shuffledVocab[cardIdx]}
                flipped={cardFlipped}
                onFlip={() => setCardFlipped((f) => !f)}
                color={content.color}
              />
            )}
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginTop: 12 }}>
              <button
                style={S.outlineBtn(content.color)}
                onClick={() => {
                  setCardFlipped(false);
                  setCardIdx((i) => Math.max(0, i - 1));
                }}
                disabled={cardIdx === 0}
              >
                ← Назад
              </button>
              {cardIdx + 1 < shuffledVocab.length ? (
                <button
                  style={S.primaryBtn(content.color)}
                  onClick={() => {
                    setCardFlipped(false);
                    setCardIdx((i) => i + 1);
                  }}
                >
                  Дальше →
                </button>
              ) : (
                <button style={S.primaryBtn(content.color)} onClick={startLearnQuiz}>
                  Готов · Перейти к тесту →
                </button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ─── QUIZ (используется и в learn-test, и в test-quiz) ─── */}
      {(phase === "learn-test" || phase === "test-quiz") && q && activeBlock && (
        <div style={S.page}>
          <div style={S.container}>
            <TopBar
              left={
                <button style={S.outlineBtn("#888")} onClick={goHome}>
                  ← В меню
                </button>
              }
              right={
                <span style={S.muted}>
                  {qIdx + 1}/{total} · {score}✓
                </span>
              }
              icon={icon}
              onTheme={cycleTheme}
            />
            <div style={{ textAlign: "center", marginBottom: 12 }}>
              <span style={{ fontSize: 13, color: "var(--text-muted)", fontWeight: 600 }}>
                {content.label} · {phase === "learn-test" ? "Мини-тест на перевод" : "Тест"}
              </span>
            </div>

            {/* Уровень + прогресс */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
              {q.level && (
                <span
                  style={{
                    fontSize: 11,
                    background: { 1: "#27ae60", 2: "#2471a3", 3: "#b7600a", 4: "#7c5cbf" }[q.level] || "#888",
                    color: "white",
                    padding: "3px 10px",
                    borderRadius: 20,
                    whiteSpace: "nowrap",
                    fontWeight: 600,
                  }}
                >
                  {{ 1: "Ур. 1 · Выбор", 2: "Ур. 2 · Плитки", 3: "Ур. 3 · Вставь", 4: "Ур. 4 · Спряжение" }[q.level]}
                </span>
              )}
            </div>
            <div style={{ height: 4, background: "var(--border-soft)", borderRadius: 2, marginBottom: 16 }}>
              <div
                style={{
                  height: 4,
                  background: content.color,
                  borderRadius: 2,
                  width: `${((qIdx + 1) / total) * 100}%`,
                  transition: "width 0.3s",
                }}
              />
            </div>

            <div style={S.card}>
              <div
                style={{
                  fontSize: 16,
                  marginBottom: 18,
                  whiteSpace: "pre-line",
                  lineHeight: 1.6,
                  color: "var(--text-main)",
                }}
              >
                {q.q}
              </div>
              {q.hint && !answered && (
                <div style={{ ...S.muted, fontStyle: "italic", marginBottom: 12 }}>💡 {q.hint}</div>
              )}

              {/* MC */}
              {q.type === "mc" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {q.opts.map((opt, i) => {
                    let bg = "var(--bg-card)",
                      border = "2px solid var(--border-soft)",
                      color = "var(--text-main)";
                    if (answered) {
                      if (i === q.ans) {
                        bg = "var(--green-bg)";
                        border = "2px solid var(--green)";
                        color = "var(--green)";
                      } else if (i === selected) {
                        bg = "var(--red-bg)";
                        border = "2px solid var(--red)";
                        color = "var(--red)";
                      } else {
                        bg = "var(--bg-soft)";
                        color = "var(--text-muted)";
                      }
                    }
                    return (
                      <button
                        key={i}
                        onClick={() => handleMC(i)}
                        style={{
                          background: bg,
                          border,
                          color,
                          padding: "11px 16px",
                          borderRadius: 10,
                          cursor: answered ? "default" : "pointer",
                          fontSize: 14,
                          fontFamily: "inherit",
                          textAlign: "left",
                          transition: "all 0.15s",
                          fontWeight: 500,
                        }}
                      >
                        {answered && i === q.ans && "✓ "}
                        {answered && i === selected && i !== q.ans && "✗ "}
                        {opt}
                      </button>
                    );
                  })}
                </div>
              )}

              {/* TILES */}
              {q.type === "tiles" && (
                <div>
                  <div
                    style={{
                      minHeight: 50,
                      background: "var(--bg-soft)",
                      border: `2px dashed ${answered ? (isCorrect ? "var(--green)" : "var(--red)") : "var(--border-soft)"}`,
                      borderRadius: 10,
                      padding: "10px 12px",
                      marginBottom: 14,
                      display: "flex",
                      flexWrap: "wrap",
                      gap: 8,
                      alignItems: "center",
                    }}
                  >
                    {tileBuilt.length === 0 && (
                      <span style={{ color: "var(--text-muted)", fontSize: 13 }}>
                        Нажимай слова снизу по порядку...
                      </span>
                    )}
                    {tileBuilt.map((id, pos) => (
                      <button
                        key={pos}
                        onClick={() => !answered && unpickTile(pos)}
                        style={{
                          background: answered
                            ? isCorrect
                              ? "var(--green-bg)"
                              : "var(--red-bg)"
                            : "var(--bg-card)",
                          border: `1.5px solid ${
                            answered ? (isCorrect ? "var(--green)" : "var(--red)") : "var(--accent)"
                          }`,
                          borderRadius: 8,
                          padding: "6px 12px",
                          cursor: answered ? "default" : "pointer",
                          fontSize: 14,
                          fontFamily: "inherit",
                          fontWeight: 600,
                          color: answered
                            ? isCorrect
                              ? "var(--green)"
                              : "var(--red)"
                            : "var(--text-main)",
                        }}
                      >
                        {q.words[id]}
                      </button>
                    ))}
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                    {tilePool.map((id) => (
                      <button
                        key={id}
                        onClick={() => !answered && pickTile(id)}
                        style={{
                          background: "var(--bg-card)",
                          border: "2px solid var(--border-soft)",
                          borderRadius: 8,
                          padding: "6px 12px",
                          cursor: answered ? "default" : "pointer",
                          fontSize: 14,
                          fontFamily: "inherit",
                          fontWeight: 600,
                          color: "var(--text-main)",
                          opacity: answered ? 0.5 : 1,
                        }}
                      >
                        {q.words[id]}
                      </button>
                    ))}
                  </div>
                  {!answered && (
                    <button
                      onClick={handleTileCheck}
                      style={S.primaryBtn(content.color)}
                      disabled={tileBuilt.length !== q.words.length}
                    >
                      Проверить ✓
                    </button>
                  )}
                </div>
              )}

              {/* FILL */}
              {q.type === "fill" && (
                <div>
                  <input
                    style={{
                      ...S.input,
                      borderColor: answered
                        ? isCorrect
                          ? "var(--green)"
                          : "var(--red)"
                        : "var(--border-input)",
                    }}
                    type="text"
                    value={userInput}
                    onChange={(e) => setUserInput(e.target.value)}
                    onKeyDown={(e) => {
                      if (e.key === "Enter" && !answered) handleFillSubmit();
                    }}
                    disabled={answered}
                    placeholder="Введи ответ..."
                    autoFocus
                  />
                  {!answered && (
                    <button
                      onClick={handleFillSubmit}
                      style={{ ...S.primaryBtn(content.color), marginTop: 12 }}
                    >
                      Проверить ✓
                    </button>
                  )}
                </div>
              )}

              {/* CONJ */}
              {q.type === "conj" && (
                <div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
                    {q.pronouns.map((p, i) => (
                      <div
                        key={i}
                        style={{ display: "flex", gap: 8, alignItems: "center" }}
                      >
                        <div
                          style={{
                            padding: "8px 10px",
                            background: "var(--bg-soft)",
                            borderRadius: 6,
                            fontWeight: 600,
                            color: "var(--text-main)",
                            minWidth: 90,
                            fontSize: 14,
                          }}
                        >
                          {p}
                        </div>
                        <input
                          style={{
                            ...S.input,
                            borderColor: answered
                              ? conjResults[i]
                                ? "var(--green)"
                                : "var(--red)"
                              : "var(--border-input)",
                          }}
                          type="text"
                          value={conjInputs[i] || ""}
                          onChange={(e) => {
                            const next = [...conjInputs];
                            next[i] = e.target.value;
                            setConjInputs(next);
                          }}
                          disabled={answered}
                          placeholder={`Форма для «${p}»`}
                        />
                      </div>
                    ))}
                  </div>
                  {!answered && (
                    <button onClick={handleConjCheck} style={S.primaryBtn(content.color)}>
                      Проверить ✓
                    </button>
                  )}
                  {answered && !isCorrect && (
                    <div style={{ fontSize: 13, marginTop: 10 }}>
                      <span style={{ color: "var(--text-muted)" }}>Правильно: </span>
                      <span style={{ color: "var(--green)", fontWeight: 600 }}>
                        {q.pronouns.map((p, i) => `${p}: ${q.ans[i]}`).join(" / ")}
                      </span>
                    </div>
                  )}
                </div>
              )}

              {/* После ответа */}
              {answered && (
                <div
                  style={{
                    marginTop: 16,
                    paddingTop: 14,
                    borderTop: "1px solid var(--border-soft)",
                  }}
                >
                  <div
                    style={{
                      fontSize: 14,
                      fontWeight: 700,
                      color: isCorrect ? "var(--green)" : "var(--red)",
                      marginBottom: 8,
                    }}
                  >
                    {isCorrect ? "✓ Правильно!" : "✗ Неправильно"}
                  </div>
                  {q.type === "tiles" && !isCorrect && (
                    <div style={{ fontSize: 13, marginBottom: 8 }}>
                      <span style={{ color: "var(--text-muted)" }}>Правильно: </span>
                      <span style={{ color: "var(--green)", fontWeight: 600 }}>{q.words.join(" ")}</span>
                    </div>
                  )}
                  {q.type === "fill" && !isCorrect && (
                    <div style={{ fontSize: 13, marginBottom: 8 }}>
                      <span style={{ color: "var(--text-muted)" }}>Правильно: </span>
                      <span style={{ color: "var(--green)", fontWeight: 600 }}>{q.ans}</span>
                    </div>
                  )}
                  {q.explain && (
                    <div
                      style={{
                        fontSize: 13,
                        color: "var(--text-muted)",
                        lineHeight: 1.5,
                        whiteSpace: "pre-line",
                      }}
                    >
                      💡 {q.explain}
                    </div>
                  )}
                  <button
                    onClick={nextQ}
                    style={{ ...S.primaryBtn(content.color), marginTop: 14 }}
                  >
                    {qIdx + 1 < total ? "Дальше →" : "Завершить →"}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ─── RESULTS ─── */}
      {phase === "results" && activeBlock && (
        <div style={S.page}>
          <div style={S.container}>
            <TopBar
              left={
                <button style={S.outlineBtn("#888")} onClick={goHome}>
                  ← В меню
                </button>
              }
              icon={icon}
              onTheme={cycleTheme}
            />
            <div style={{ textAlign: "center", marginBottom: 24 }}>
              <div style={{ fontSize: 52, marginBottom: 6 }}>
                {(() => {
                  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
                  return pct >= 85 ? "🏆" : pct >= 65 ? "💪" : "📚";
                })()}
              </div>
              <div style={{ ...S.muted, marginBottom: 4 }}>{content.label}</div>
              <h2 style={{ fontSize: 22, marginBottom: 6, color: "var(--text-title)" }}>
                {(() => {
                  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
                  return pct >= 85 ? "Ausgezeichnet!" : pct >= 65 ? "Gut gemacht!" : "Weiter üben!";
                })()}
              </h2>
              <div
                style={{
                  fontSize: 44,
                  fontWeight: 700,
                  color: "var(--green)",
                  margin: "10px 0",
                }}
              >
                {score} / {total}
              </div>
              <div style={S.muted}>
                {total > 0 ? Math.round((score / total) * 100) : 0}% правильных ответов
              </div>
              <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 18, flexWrap: "wrap" }}>
                <button onClick={goHome} style={S.primaryBtn("#1a1d2e")}>
                  ← В меню
                </button>
                <button
                  onClick={() => {
                    if (mode === "learn") {
                      startLearnQuiz();
                    } else {
                      startTestQuizFromContent(content);
                    }
                  }}
                  style={S.outlineBtn(content.color)}
                >
                  ⚡ Повторить
                </button>
              </div>
            </div>

            {/* Разбор */}
            <h3 style={{ fontSize: 16, marginBottom: 12, color: "var(--text-title)" }}>📋 Разбор</h3>
            {history.map((entry, idx) => {
              const { q: hq, userAnswer, isCorrect: ok } = entry;
              return (
                <div
                  key={idx}
                  style={{
                    ...S.card,
                    border: `1px solid ${ok ? "rgba(26,122,74,0.3)" : "rgba(192,57,43,0.3)"}`,
                    marginBottom: 10,
                  }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <span style={S.muted}>
                      {idx + 1}/{history.length}
                    </span>
                    <span style={{ fontSize: 18, color: ok ? "var(--green)" : "var(--red)" }}>
                      {ok ? "✓" : "✗"}
                    </span>
                  </div>
                  <div style={{ fontSize: 14, marginBottom: 8, whiteSpace: "pre-line", lineHeight: 1.5 }}>
                    {hq.q}
                  </div>
                  <div style={{ fontSize: 13, marginBottom: ok ? 0 : 6 }}>
                    <span style={S.muted}>Твой ответ: </span>
                    <span style={{ color: ok ? "var(--green)" : "var(--red)", fontWeight: 600 }}>
                      {userAnswer}
                    </span>
                  </div>
                  {!ok && (
                    <div style={{ fontSize: 13, marginBottom: 4 }}>
                      <span style={S.muted}>Правильно: </span>
                      <span style={{ color: "var(--green)", fontWeight: 600 }}>
                        {hq.type === "mc"
                          ? hq.opts[hq.ans]
                          : hq.type === "tiles"
                          ? hq.words.join(" ")
                          : hq.type === "fill"
                          ? hq.ans
                          : hq.type === "conj"
                          ? hq.pronouns.map((p, i) => `${p}: ${hq.ans[i]}`).join(" / ")
                          : "—"}
                      </span>
                    </div>
                  )}
                  {!ok && hq.explain && (
                    <div
                      style={{
                        fontSize: 12,
                        color: "var(--text-muted)",
                        marginTop: 6,
                        paddingTop: 6,
                        borderTop: "1px solid var(--border-soft)",
                        lineHeight: 1.5,
                      }}
                    >
                      💡 {hq.explain}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </>
  );
}


// Рендер
ReactDOM.render(React.createElement(App), document.getElementById('root'));

</script>

</body>
</html>
