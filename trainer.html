function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function normalise(s) {
  return (s || "")
    .toLowerCase()
    .replace(/ä/g, "ae")
    .replace(/ö/g, "oe")
    .replace(/ü/g, "ue")
    .replace(/ß/g, "ss")
    .replace(/[.!?,;"„“]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
function checkFill(userVal, ans, altAns = []) {
  const u = normalise(userVal);
  if (!u) return false;
  if (u === normalise(ans)) return true;
  return altAns.some((a) => normalise(a) === u);
}
// Сделать MC-вопросы с перетасованными опциями
function shuffleMC(questions) {
  return questions.map((q) => {
    if (q.type !== "mc") return q;
    const indexed = q.opts.map((o, i) => ({ o, correct: i === q.ans }));
    const sh = shuffle(indexed);
    return {
      ...q,
      opts: sh.map((x) => x.o),
      ans: sh.findIndex((x) => x.correct),
    };
  });
}
// Группировка вопросов по уровню + перемешать внутри уровня
function arrangeByLevel(questions) {
  const byLevel = {};
  questions.forEach((q) => {
    const l = q.level;
    if (!byLevel[l]) byLevel[l] = [];
    byLevel[l].push(q);
  });
  return Object.keys(byLevel)
    .sort((a, b) => +a - +b)
    .flatMap((l) => shuffle(byLevel[l]));
}

// УПРАВЛЕНИЕ ТЕМОЙ (хук)
// ═══════════════════════════════════════════════════════════════
function useTheme() {
  const [theme, setTheme] = useState(() => {
    try {
      return localStorage.getItem("theme") || "auto";
    } catch (e) {
      return "auto";
    }
  });
  useEffect(() => {
    // При 'auto' резолвим через системную настройку (matchMedia)
    // и ставим конкретный класс — палитра живёт только в :root и .theme-dark
    let resolved = theme;
    if (theme === "auto" && window.matchMedia) {
      resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.classList.remove("theme-auto", "theme-light", "theme-dark");
    document.documentElement.classList.add("theme-" + resolved);
    try {
      localStorage.setItem("theme", theme);
    } catch (e) {}

    // Если выбран 'auto' — подписываемся на изменение системной темы
    if (theme === "auto" && window.matchMedia) {
      const mq = window.matchMedia("(prefers-color-scheme: dark)");
      const handler = () => {
        document.documentElement.classList.remove("theme-light", "theme-dark");
        document.documentElement.classList.add("theme-" + (mq.matches ? "dark" : "light"));
      };
      mq.addEventListener("change", handler);
      return () => mq.removeEventListener("change", handler);
    }
  }, [theme]);
  function cycleTheme() {
    setTheme((t) => (t === "auto" ? "light" : t === "light" ? "dark" : "auto"));
  }
  const icon = theme === "auto" ? "🌓" : theme === "light" ? "☀️" : "🌙";
  return { theme, cycleTheme, icon };
}

                — {conj.ru}
              </div>
            )}
            <div style={{ fontSize: 12, color: "var(--text-muted)" }}>
              Нажми, чтобы увидеть Präteritum
            </div>
          </div>
        </div>
        <div className="flip-face back"
             style={{ background: color, color: "var(--on-color)", textAlign: "center" }}>
          <div style={{ padding: "0 20px" }}>
            <div style={{ fontSize: 14, opacity: 0.85, marginBottom: 8 }}>Präteritum · er/sie/es</div>
            <div style={{ fontSize: 36, fontWeight: 700, marginBottom: 16 }}>
              {conj.praeteritum || "—"}
            </div>
            {conj.aux && (
              <div style={{ fontSize: 13, opacity: 0.85 }}>
                Perfekt: {conj.aux === "sein" ? "ist" : "hat"} {conj.partizip2 || "..."}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// КОМПОНЕНТ: КАРТОЧКА (FLIP)

function FlipCard({ item, flipped, onFlip, color }) {
  const badge = item.gender ? S.badge(item.gender) : null;

  const forms = isVerb ? resolveVerbForms(item, (typeof CONJUGATIONS !== "undefined" ? CONJUGATIONS : [])) : null;

    <div
      onClick={onFlip}

        perspective: 1000,
        cursor: "pointer",

            <div style={{ fontSize: 28, fontWeight: 700, color: "var(--text-title)", marginBottom: 8 }}>
              {item.de}
            </div>
            {item.plural && (
              <div style={{ fontSize: 14, color: "var(--text-muted)", marginBottom: 8 }}>
                Pl: {item.plural}

            <div style={{ fontSize: 12, color: "var(--text-muted)" }}>
              Нажми, чтобы перевернуть
            </div>
          </div>
        </div>
        <div
          className="flip-face back"
          style={{
            background: color,
            color: "var(--on-color)",
            textAlign: "center",
          }}
        >
          {isVerb ? (
            <div style={{ padding: "0 16px", width: "100%" }}>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>
                {item.de} · <span style={{ opacity: 0.9, fontWeight: 400 }}>{item.ru}</span>
              </div>
              <div style={{ fontSize: 13, opacity: 0.85, marginBottom: 10 }}>Präsens</div>
              <table style={{ margin: "0 auto", fontSize: 14 }}>
                <tbody>
                  {forms.pronouns.map((p, i) => (
                    <tr key={i}>
                      <td style={{ padding: "2px 12px", textAlign: "right", opacity: 0.85 }}>{p}</td>
                      <td style={{ padding: "2px 12px", textAlign: "left", fontWeight: 700 }}>
                        {forms.praesens[i]}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {(forms.praeteritum || forms.partizip2) && (
                <div style={{
                  marginTop: 12, paddingTop: 10,
                  borderTop: "1px solid rgba(255,255,255,0.25)",
                  display: "flex", flexDirection: "column", gap: 3,
                  fontSize: 13,
                }}>
                  {forms.praeteritum && (
                    <div>
                      <span style={{ opacity: 0.85 }}>Präteritum: </span>
                      <span style={{ fontWeight: 700 }}>{forms.praeteritum}</span>
                      <span style={{ opacity: 0.7, fontSize: 11 }}> (er/sie/es)</span>
                    </div>
                  )}
                  {forms.partizip2 && (
                    <div>
                      <span style={{ opacity: 0.85 }}>Perfekt: </span>
                      <span style={{ fontWeight: 700 }}>
                        {forms.aux === "sein" ? "ist" : "hat"} {forms.partizip2}
                      </span>
                    </div>
                  )}
                </div>
              )}
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 24, fontWeight: 700, marginBottom: 10 }}>{item.ru}</div>
              {item.note && (
                <div style={{ fontSize: 13, opacity: 0.9, lineHeight: 1.5, padding: "0 20px" }}>{item.note}</div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════
// АВТОГЕНЕРАЦИЯ ВОПРОСОВ
// ═══════════════════════════════════════════════════════════════
// Источник: VOCAB, CONJUGATIONS из data.js
// Уровни:
//   1 — перевод DE→RU, RU→DE (mc)
//   2 — артикль для noun (mc), спряжение Präsens regelmäßig (mc)
//   3 — спряжение unregelmäßig (fill), plural (fill), артикль в Nom предложении (mc)
//   4 — tiles (из QUESTIONS) — авто-генерации нет, берём только ручные
//   5 — рукописные ответы (из QUESTIONS, пока пусто)

// ─── Хелперы для форматирования noun ────────────────────────────────────────
function formatNounFull(item) {
  // "der Tisch — die Tische" или "die Frau — die Frauen"
  // Если plural есть — добавляем; если нет — только de
  if (item.plural) return `${item.de} — ${item.plural}`;
  return item.de;
}

function nounStem(article_de) {
  // "der Tisch" → "Tisch"
  return article_de.replace(/^(der |die |das )/, "");
}

// ─── Спряжение regelmäßig ──────────────────────────────────────────────────
// ─── Спряжение regelmäßig в Präsens (расширенная версия) ──────────────────
// Покрывает основные правила A1-A2:
//   1. Стандартный stem = inf - "en"
//   2. Stem на -t/-d → вставка -e- для du/er/ihr  (arbeiten → du arbeitest)
//   3. Stem на согласный + m/n → вставка -e-      (atmen → du atmest, öffnen → du öffnest)
//   4. Stem на -s/-ß/-z/-x → du: только -t        (reisen → du reist, heißen → du heißt)
//   5. -eln: stem - "n", ich теряет -e-           (sammeln → ich sammle, wir sammeln)
//   6. -ern: stem - "n", wir/Sie добавляют "n"    (wandern → ich wandere, wir wandern)
function conjRegelmaessig(infinitive, pronoun) {
  // Защита: эти глаголы должны браться из CONJUGATIONS, а не из автогенератора
  const UNREGEL = new Set([
    "sein", "haben", "werden", "wissen", "mögen", "müssen", "können",
    "dürfen", "sollen", "wollen", "lassen", "fahren", "laufen", "schlafen",
    "lesen", "sehen", "geben", "nehmen", "kommen", "gehen", "stehen",
    "tragen", "waschen", "fallen", "halten", "schreiben",
  ]);
  if (UNREGEL.has(infinitive)) {
    console.warn(`conjRegelmaessig: «${infinitive}» — нерегулярный, должен браться из CONJUGATIONS`);
    return infinitive;  // вернём инфинитив, лучше чем мусор
  }

  const isEln = infinitive.endsWith("eln");
  const isErn = infinitive.endsWith("ern");
  const isElNorRN = isEln || isErn;

  // Выделение основы (stem)
  let stem;
  if (isElNorRN) {
    stem = infinitive.slice(0, -1);   // sammeln → sammel, wandern → wander
  } else if (infinitive.endsWith("en")) {
    stem = infinitive.slice(0, -2);   // machen → mach, wohnen → wohn
  } else if (infinitive.endsWith("n")) {
    stem = infinitive.slice(0, -1);
  } else {
    stem = infinitive;
  }

  // Stem на -t/-d → вставка -e- для du/er/ihr  (arbeiten, finden, landen, warten)
  const endsInTD = /[td]$/.test(stem);
  // Конкретные кластеры согласных + m/n которые требуют -e- (для пронунсиации)
  // chn (zeichnen, rechnen), ffn (öffnen), tm/dm (atmen, widmen), gm (segmen)
  const needsEByCluster = /(chn|ffn|tm|dm|gn)$/.test(stem);
  const needsE = endsInTD || needsEByCluster;

  // Stem на шипящие (s/ß/z/x) → у du только -t вместо -st
  const sibilantEnd = /[sßzx]$/.test(stem);

  switch (pronoun) {
    case "ich":
      // -eln: stem "sammel" → "sammle" (выпадает -e- перед -l)
      if (isEln) return stem.slice(0, -2) + "le";
      return stem + "e";

    case "du":
      if (sibilantEnd) return stem + "t";       // du reist, heißt, tanzt
      if (needsE) return stem + "est";          // du arbeitest, atmest
      return stem + "st";                       // du machst

    case "er":
    case "sie":  // 3.л. ед. (контекст — она)
    case "es":
      if (needsE) return stem + "et";           // er arbeitet, atmet
      return stem + "t";                        // er macht

    case "wir":
    case "Sie":
    case "sie_pl":
      if (isElNorRN) return stem + "n";         // wir sammeln, wandern
      return stem + "en";                       // wir machen

    case "ihr":
      if (needsE) return stem + "et";           // ihr arbeitet, atmet
      return stem + "t";                        // ihr macht

    default:
      return stem + "en";
  }
}

// ═══════════════════════════════════════════════════════════════
// АВТОГЕНЕРАТОР Partizip II (regelmäßig)
// Правила:
//   - На -ieren: без ge-, +t (studieren → studiert)
//   - Неотделяемые приставки (be/ent/er/ge/ver/zer/miss/emp): без ge-
//   - Отделяемые приставки (auf/ein/aus/...): prefix + ge + stem + t/et
//   - Стандарт: ge + stem + t/et (на -t/-d → -et)
// ═══════════════════════════════════════════════════════════════
const INSEPARABLE_PREFIXES_P2 = ["be", "ent", "er", "ge", "ver", "zer", "miss", "emp"];
const SEPARABLE_PREFIXES_P2 = [
  "ab", "an", "auf", "aus", "bei", "ein", "fest", "fort", "her", "hin",
  "los", "mit", "nach", "vor", "weg", "weiter", "zu", "zurück", "zusammen"
];

function partizip2Regelmaessig(infinitive) {
  // На -ieren: без ge-
  if (infinitive.endsWith("ieren")) {
    return infinitive.slice(0, -2) + "t";  // studieren → studiert
  }

  // Stem
  let stem;
  if (infinitive.endsWith("en")) {
    stem = infinitive.slice(0, -2);
  } else if (infinitive.endsWith("n")) {
    stem = infinitive.slice(0, -1);
  } else {
    stem = infinitive;
  }

  // Окончание (с -et или -t)
  const needsEt = /[td]$/.test(stem) || /(chn|ffn|tm|dm|gn)$/.test(stem);
  const ending = needsEt ? "et" : "t";

  // Неотделяемая приставка → без ge-
  for (const prefix of INSEPARABLE_PREFIXES_P2) {
    if (infinitive.startsWith(prefix) && infinitive.length > prefix.length + 2) {
      return stem + ending;
    }
  }

  // Отделяемая приставка → prefix + ge + ...
  for (const prefix of SEPARABLE_PREFIXES_P2) {
    if (infinitive.startsWith(prefix) && infinitive.length > prefix.length + 2) {
      const subInf = infinitive.slice(prefix.length);
      return prefix + partizip2Regelmaessig(subInf);
    }
  }

  // Стандарт
  return "ge" + stem + ending;
}

// Получить Partizip II глагола: 3 приоритета
//   1. CONJUGATIONS (unregelmäßig) если поле partizip2 заполнено
//   2. REGEL_VERBS (партицип в таблице — для исключений)
//   3. partizip2Regelmaessig (автогенератор) — fallback
function getPartizip2(infinitive, conjugations) {
  const conj = conjugations.find(c => c.verb === infinitive);
  if (conj && conj.partizip2) return conj.partizip2;
  if (typeof REGEL_VERBS !== "undefined") {
    const reg = REGEL_VERBS.find(v => v.verb === infinitive);
    if (reg && reg.partizip2) return reg.partizip2;
  }
  return partizip2Regelmaessig(infinitive);
}

// ─── Автогенератор Präteritum для regelmäßig ──────────────────────────────
// Правило: stem + "te" (для er/sie/es), для основ на -t/-d/(chn|ffn|tm|dm|gn) → -ete
// Отделяемая приставка остаётся в конце (как в Präsens): "kaufte ein"
// Возвратные местоимения не подставляются — это делает рендерер
function praeteritumRegelmaessig(infinitive) {
  // -ieren: studieren → studierte (без особенностей)
  // отделяемые приставки
  for (const prefix of SEPARABLE_PREFIXES_P2) {
    if (infinitive.startsWith(prefix) && infinitive.length > prefix.length + 2) {
      const subInf = infinitive.slice(prefix.length);
      return praeteritumRegelmaessig(subInf) + " " + prefix;
    }
  }
  let stem;
  if (infinitive.endsWith("en")) stem = infinitive.slice(0, -2);
  else if (infinitive.endsWith("n")) stem = infinitive.slice(0, -1);
  else stem = infinitive;
  const needsE = /[td]$/.test(stem) || /(chn|ffn|tm|dm|gn)$/.test(stem);
  return stem + (needsE ? "ete" : "te");
}

// Резолвер форм глагола для FlipCard: возвращает 6 форм Präsens + Präteritum + Perfekt
// Источники по приоритету:
//   1. CONJUGATIONS (для unregel — там полные формы)
//   2. Поля самой записи VOCAB (.praeteritum, .partizip2, .aux)
//   3. Автогенерация (conjRegelmaessig / praeteritumRegelmaessig / partizip2Regelmaessig)
function resolveVerbForms(item, conjugations) {
  // 1. unregel — пробуем взять из CONJUGATIONS
  const conj = conjugations.find(c => c.verb === item.de);
  if (conj) {
    return {
      pronouns: conj.pronouns,
      praesens: conj.forms,
      praeteritum: conj.praeteritum || null,
      partizip2: conj.partizip2 || null,
      aux: conj.aux || item.aux || "haben",
    };
  }
  // 2/3. regel или unregel вне CONJUGATIONS — спрягаем + читаем поля
  const pronouns = ["ich", "du", "er/sie/es", "wir", "ihr", "sie/Sie"];
  const praesens = [
    conjRegelmaessig(item.de, "ich"),
    conjRegelmaessig(item.de, "du"),
    conjRegelmaessig(item.de, "er"),
    conjRegelmaessig(item.de, "wir"),
    conjRegelmaessig(item.de, "ihr"),
    conjRegelmaessig(item.de, "Sie"),
  ];
  return {
    pronouns, praesens,
    praeteritum: item.praeteritum || praeteritumRegelmaessig(item.de),
    partizip2:   item.partizip2  || partizip2Regelmaessig(item.de),
    aux: item.aux || "haben",
  };
}

// Получить aux (haben/sein) для глагола
function getAux(infinitive, conjugations) {
  const conj = conjugations.find(c => c.verb === infinitive);
  if (conj && conj.aux) return conj.aux;
  if (typeof REGEL_VERBS !== "undefined") {
    const reg = REGEL_VERBS.find(v => v.verb === infinitive);
    if (reg && reg.aux) return reg.aux;
  }
  return "haben";  // дефолт
}

// Получить спряжение глагола: 3 приоритета:
//   1. CONJUGATIONS (unregelmäßig — sein, haben, gehen и т.д.) — высший приоритет
//   2. REGEL_VERBS (твоя таблица regelmäßig — вручную проверенные формы)
//   3. conjRegelmaessig (автогенератор) — fallback
function getConjForm(infinitive, pronounIdx, conjugations) {
  // pronounIdx: 0=ich, 1=du, 2=er/sie/es, 3=wir, 4=ihr, 5=sie/Sie
  // 1. unregelmäßig
  const conj = conjugations.find(c => c.verb === infinitive);
  if (conj && conj.forms && conj.forms[pronounIdx]) {
    return conj.forms[pronounIdx];
  }
  // 2. таблица regelmäßig (если она подключена)
  if (typeof REGEL_VERBS !== "undefined") {
    const reg = REGEL_VERBS.find(v => v.verb === infinitive);
    if (reg && reg.forms && reg.forms[pronounIdx]) {
      return reg.forms[pronounIdx];
    }
  }
  // 3. автогенератор (fallback)
  const pronouns = ["ich", "du", "er", "wir", "ihr", "sie_pl"];
  return conjRegelmaessig(infinitive, pronouns[pronounIdx]);
}

// ─── Похожесть по триграммам (для выбора правдоподобных дистракторов) ─────
// Нормализация немецкого слова для сравнения: lower-case + убрать ведущий
// артикль / неопр. артикль. Используем "сырой" lower-case (без преобразования
// umlauts → ae/oe/ue) — нам важно сходство ПО НЕМЕЦКОМУ написанию.
const _DIST_LEADING_ARTICLE = /^(der|die|das|den|dem|des|ein|eine|einen|einem|einer|eines)\s+/i;
function normDeForSim(s) {
  if (!s) return "";
  return String(s).toLowerCase().replace(_DIST_LEADING_ARTICLE, "").trim();
}
function trigramsOf(s) {
  const out = new Set();
  if (!s || s.length < 3) return out;
  for (let i = 0; i <= s.length - 3; i++) out.add(s.slice(i, i + 3));
  return out;
}
function trigramSimilarity(de1, de2) {
  const a = trigramsOf(normDeForSim(de1));
  const b = trigramsOf(normDeForSim(de2));
  if (a.size === 0 || b.size === 0) return 0;
  let common = 0;
  for (const t of a) if (b.has(t)) common++;
  return common / Math.max(a.size, b.size);
}
const DIST_SIM_THRESHOLD = 0.2;

// ─── Каскадный выбор дистракторов из VOCAB ────────────────────────────────
// Каскад (с добором до `count`):
//   1) тот же pos + общий topic (рандом)
//   2) тот же pos + триграммная похожесть >= 0.2 (по убыванию)
//   3) любой pos + триграммная похожесть >= 0.2 (по убыванию)
//   4) тот же pos рандом (если совсем мало контента)
//
// Опции:
//   acceptable(v): доп. предикат (например, v.ru !== item.ru)
//   uniqueKey(v):  ключ уникальности (по умолчанию v.id).
//                  Для перевода передаём v.ru или v.de, чтобы избежать
//                  визуально одинаковых вариантов.
//
// Возвращает массив VOCAB-записей (до count). Если их меньше count —
// генератор сам решит, отдавать null или нет.
function pickDistractors(item, count, vocabPool, opts) {
  opts = opts || {};
  const acceptable = opts.acceptable || function() { return true; };
  const uniqueKey  = opts.uniqueKey  || function(v) { return v.id; };

  const taken = [];
  const takenKeys = new Set([uniqueKey(item)]);

  function tryAdd(v) {
    if (v.id === item.id) return;
    if (!acceptable(v)) return;
    const k = uniqueKey(v);
    if (k == null || takenKeys.has(k)) return;
    taken.push(v);
    takenKeys.add(k);
  }

  // Уровень 1: тот же pos + общий topic
  if (taken.length < count) {
    const itemTopics = new Set(item.topics || []);
    if (itemTopics.size > 0) {
      const level1 = vocabPool.filter(v =>
        v.id !== item.id &&
        v.pos === item.pos &&
        (v.topics || []).some(t => itemTopics.has(t))
      );
      for (const v of shuffle(level1)) {
        if (taken.length >= count) break;
        tryAdd(v);
      }
    }
  }

  // Уровень 2: тот же pos + триграммная похожесть >= порога
  if (taken.length < count) {
    const level2 = vocabPool
      .filter(v =>
        v.id !== item.id &&
        v.pos === item.pos &&
        !takenKeys.has(uniqueKey(v))
      )
      .map(v => ({ v, sim: trigramSimilarity(v.de, item.de) }))
      .filter(x => x.sim >= DIST_SIM_THRESHOLD)
      .sort((a, b) => b.sim - a.sim);
    for (const { v } of level2) {
      if (taken.length >= count) break;
      tryAdd(v);
    }
  }

  // Уровень 3: любой pos + триграммная похожесть >= порога
  if (taken.length < count) {
    const level3 = vocabPool
      .filter(v =>
        v.id !== item.id &&
        !takenKeys.has(uniqueKey(v))
      )
      .map(v => ({ v, sim: trigramSimilarity(v.de, item.de) }))
      .filter(x => x.sim >= DIST_SIM_THRESHOLD)
      .sort((a, b) => b.sim - a.sim);
    for (const { v } of level3) {
      if (taken.length >= count) break;
      tryAdd(v);
    }
  }

  // Уровень 4: рандом из всего pos
  if (taken.length < count) {
    const level4 = vocabPool.filter(v =>
      v.id !== item.id &&
      v.pos === item.pos &&
      !takenKeys.has(uniqueKey(v))
    );
    for (const v of shuffle(level4)) {
      if (taken.length >= count) break;
      tryAdd(v);
    }
  }

  return taken;
}

// ─── Генератор: Ур 1 — перевод DE→RU ─────────────────────────────────────
function genL1_translate_DE_RU(item, vocabPool) {
  // Дистракторы через каскад: тот же topic → похожие → рандом
  const picks = pickDistractors(item, 3, vocabPool, {
    acceptable: v => v.ru && v.ru !== item.ru,
    uniqueKey:  v => v.ru,  // уникальность по русскому переводу (анти-дубль в опциях)
  });
  if (picks.length < 3) return null;
  const distractors = picks.map(v => v.ru);

  const de = item.de;
  const opts = shuffle([item.ru, ...distractors]);
  const ans = opts.indexOf(item.ru);

  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Переведи: «${de}»`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 1 — перевод RU→DE ─────────────────────────────────────
function genL1_translate_RU_DE(item, vocabPool) {
  const picks = pickDistractors(item, 3, vocabPool, {
    acceptable: v => v.de && v.de !== item.de,
    uniqueKey:  v => v.de,  // уникальность по немецкому написанию
  });
  if (picks.length < 3) return null;
  const distractors = picks.map(v => v.de);
  const correct = item.de;
  const opts = shuffle([correct, ...distractors]);
  const ans = opts.indexOf(correct);

  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Как сказать «${item.ru}»?`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — артикль (для noun) ─────────────────────────────────
function genL2_article(item) {
  if (item.pos !== "noun" || !item.gender || item.gender === "pl") return null;
  const articleMap = { m: "der", f: "die", n: "das" };
  const correct = articleMap[item.gender];
  if (!correct) return null;
  const stem = nounStem(item.de);

  const opts = ["der", "die", "das"];
  const ans = opts.indexOf(correct);

  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Какой артикль? «___ ${stem}»`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — спряжение Präsens regelmäßig (mc) ──────────────────
const PRONOUNS_DISPLAY = ["ich", "du", "er", "wir", "ihr", "sie"];

function genL2_conj_regelmaessig(item, vocabPool, conjugations) {
  if (item.pos !== "verb") return null;
  // Пропускаем глаголы которые есть в CONJUGATIONS — они unregelmäßig (это Ур 3)
  if (conjugations.find(c => c.verb === item.de)) return null;
  // Пропускаем модальные/возвратные/составные (с пробелами)
  if (item.de.includes(" ")) return null;

  // Берём случайное местоимение (не "ich" - оно тривиальное, и не "wir/sie" - одинаковые)
  const pronounIdx = [1, 2, 4][Math.floor(Math.random() * 3)]; // du / er / ihr
  const correctForm = getConjForm(item.de, pronounIdx, conjugations);

  // Дистракторы: формы того же глагола для других местоимений
  const allForms = [0, 1, 2, 3, 4, 5].map(i => getConjForm(item.de, i, conjugations));
  const wrongForms = [...new Set(allForms.filter(f => f !== correctForm))];
  if (wrongForms.length < 3) return null;
  const distractors = shuffle(wrongForms).slice(0, 3);

  const opts = shuffle([correctForm, ...distractors]);
  const ans = opts.indexOf(correctForm);

  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Спряги «${item.de}» для «${PRONOUNS_DISPLAY[pronounIdx]}»:`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — plural существительного (fill) ────────────────────
// Перенесено из Ур 3 — это базовая форма слова, относится к Ур 2
function genL2_plural(item) {
  if (item.pos !== "noun" || !item.plural || item.gender === "pl") return null;
  return {
    auto: true, level: "A1", difficulty: 2, type: "fill",
    q: `Множественное число от «${item.de}»?`,

    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — Komparativ для adj (mc) ───────────────────────────
// Автогенерация Komparativ с правилами + список исключений
const ADJ_COMP_EXCEPTIONS = {
  "alt": "älter", "groß": "größer", "gut": "besser", "viel": "mehr",
  "kurz": "kürzer", "warm": "wärmer", "kalt": "kälter", "stark": "stärker",
  "jung": "jünger", "hoch": "höher", "lang": "länger", "klug": "klüger",
  "arm": "ärmer", "dumm": "dümmer", "hart": "härter", "krank": "kränker",
  "schwach": "schwächer", "scharf": "schärfer", "rot": "röter",
  "schwarz": "schwärzer", "gern": "lieber",
};

function adjKomparativ(adj) {
  if (ADJ_COMP_EXCEPTIONS[adj]) return ADJ_COMP_EXCEPTIONS[adj];
  // -e в конце → +r
  if (adj.endsWith("e")) return adj + "r";
  // -el → выпадает e: dunkel → dunkler
  if (adj.endsWith("el")) return adj.slice(0, -2) + "ler";
  // -er → выпадает e: teuer → teurer
  if (adj.endsWith("er")) return adj.slice(0, -2) + "rer";
  // стандартно: + er
  return adj + "er";
}

function genL2_komparativ(item, vocabPool) {
  if (item.pos !== "adj") return null;
  // Не делаем для adv (у наречий обычно нет Komparativ кроме особых)
  const correct = adjKomparativ(item.de);
  // Дистракторы — варианты которые могли бы быть, но неправильные
  const distractors = [
    item.de + "t",          // schnellt
    item.de + "ste",        // schnellste
    item.de + "e",          // schnelle
  ].filter(d => d !== correct);
  if (distractors.length < 3) return null;
  const opts = shuffle([correct, ...distractors.slice(0, 3)]);
  const ans = opts.indexOf(correct);
  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Как будет «${item.de}» в Komparativ?`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — слово по теме (для adj/adv, mc) ───────────────────
// Цель: натренировать ассоциацию слова с темой
const TOPIC_RU_HINTS = {
  "adj:colors": "цвет",
  "adj:things": "характеристика предмета",
  "adj:people-emotions": "эмоция / состояние",
  "adj:price-taste": "цена / вкус",
  "adj:marital": "семейный статус",
  "adv:time-frequency": "время или частота",
  "adv:place-direction": "место / направление",
  "adv:degree-quantity": "степень / количество",
  "adv:agreement": "согласие / реакция",
  "adv:feelings": "самочувствие",
  "adv:particles": "частица",
};

function genL2_topic_classify(item, vocabPool) {
  if (item.pos !== "adj" && item.pos !== "adv") return null;
  const topic = item.topics?.[0];
  if (!topic) return null;
  const hint = TOPIC_RU_HINTS[topic];
  if (!hint) return null;
  // Дистракторы: 3 слова из ДРУГИХ topics того же pos
  const sameTypeOtherTopic = vocabPool.filter(v =>
    v.pos === item.pos && v.id !== item.id &&
    !(v.topics || []).some(t => t === topic)
  );
  if (sameTypeOtherTopic.length < 3) return null;
  const distractors = shuffle(sameTypeOtherTopic).slice(0, 3).map(v => v.de);
  const opts = shuffle([item.de, ...distractors]);
  const ans = opts.indexOf(item.de);
  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Какое слово описывает «${hint}»?`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 2 — Pers. Pronouns Nom/Akk/Dat (mc) ───────────────────
// Захардкоженная таблица личных местоимений
const PERSONAL_PRONOUNS_TABLE = [
  { nom: "ich",   akk: "mich",  dat: "mir",   ru: "я" },
  { nom: "du",    akk: "dich",  dat: "dir",   ru: "ты" },
  { nom: "er",    akk: "ihn",   dat: "ihm",   ru: "он" },
  { nom: "sie",   akk: "sie",   dat: "ihr",   ru: "она" },
  { nom: "es",    akk: "es",    dat: "ihm",   ru: "оно" },
  { nom: "wir",   akk: "uns",   dat: "uns",   ru: "мы" },
  { nom: "ihr",   akk: "euch",  dat: "euch",  ru: "вы (мн.)" },
  { nom: "sie",   akk: "sie",   dat: "ihnen", ru: "они" },
  { nom: "Sie",   akk: "Sie",   dat: "Ihnen", ru: "Вы (вежл.)" },
];

const PRONOUN_TEMPLATES_AKK = [
  "Er sieht ___",       // Akk
  "Ich verstehe ___",   // Akk
  "Sie kennt ___",      // Akk
  "Wir lieben ___",     // Akk
];
const PRONOUN_TEMPLATES_DAT = [
  "Er gibt ___ ein Buch",  // Dat
  "Sie hilft ___",          // Dat
  "Ich danke ___",          // Dat
  "Es gefällt ___",         // Dat
];

function genL2_pers_pronoun(vocabPool) {
  // Случайно выбираем местоимение и шаблон
  const p = PERSONAL_PRONOUNS_TABLE[Math.floor(Math.random() * PERSONAL_PRONOUNS_TABLE.length)];
  const useAkk = Math.random() < 0.5;
  const tmplPool = useAkk ? PRONOUN_TEMPLATES_AKK : PRONOUN_TEMPLATES_DAT;
  const tmpl = tmplPool[Math.floor(Math.random() * tmplPool.length)];
  const correct = useAkk ? p.akk : p.dat;
  // Дистракторы — другие формы того же местоимения + случайные
  const distractors = new Set();
  distractors.add(p.nom);  // именительный
  distractors.add(useAkk ? p.dat : p.akk);  // другой падеж
  // Подмешиваем случайные из таблицы
  while (distractors.size < 3) {
    const r = PERSONAL_PRONOUNS_TABLE[Math.floor(Math.random() * PERSONAL_PRONOUNS_TABLE.length)];
    distractors.add(r.akk);
    if (distractors.size < 3) distractors.add(r.dat);
  }
  distractors.delete(correct);
  const opts = shuffle([correct, ...[...distractors].slice(0, 3)]);
  const ans = opts.indexOf(correct);
  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Вставь местоимение «${p.ru}»:\n${tmpl.replace("___", "_____")}`,
    opts, ans,
  };
}

// ─── Генератор: Ур 3 — артикль в контексте (для существительных, mc) ──
// Шаблоны с указанием падежа
const ARTICLE_TEMPLATES = [
  { tmpl: "___ {noun} ist hier",        case: "Nom" },
  { tmpl: "___ {noun} ist sehr schön",  case: "Nom" },
  { tmpl: "Ich habe ___ {noun}",        case: "Akk" },
  { tmpl: "Ich kaufe ___ {noun}",       case: "Akk" },
  { tmpl: "Ich sehe ___ {noun}",        case: "Akk" },
  { tmpl: "Er nimmt ___ {noun}",        case: "Akk" },
  { tmpl: "Ich helfe ___ {noun}",       case: "Dat" },
  { tmpl: "Ich spreche mit ___ {noun}", case: "Dat" },
  { tmpl: "Es gehört ___ {noun}",       case: "Dat" },
  { tmpl: "Wir danken ___ {noun}",      case: "Dat" },
];

// Артикли по роду и падежу (с definite артиклем)
const ARTICLE_FORMS = {
  m: { Nom: "der", Akk: "den", Dat: "dem" },
  f: { Nom: "die", Akk: "die", Dat: "der" },
  n: { Nom: "das", Akk: "das", Dat: "dem" },
};

function genL3_article_in_context(item) {
  if (item.pos !== "noun" || !item.gender || item.gender === "pl") return null;
  const tmpl = ARTICLE_TEMPLATES[Math.floor(Math.random() * ARTICLE_TEMPLATES.length)];
  const forms = ARTICLE_FORMS[item.gender];
  if (!forms) return null;
  const correct = forms[tmpl.case];
  // Дистракторы — другие артикли
  const allArticles = ["der", "die", "das", "den", "dem"];
  const distractors = allArticles.filter(a => a !== correct).slice(0, 3);
  const opts = shuffle([correct, ...distractors]);
  const ans = opts.indexOf(correct);
  // Имя существительного без артикля
  const nounStem = item.de.replace(/^(der |die |das )/, "");
  const display = tmpl.tmpl.replace("{noun}", nounStem);
  return {
    auto: true, level: "A2", difficulty: 3, type: "mc",
    q: `Вставь артикль (${tmpl.case}):\n${display}`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Генератор: Ур 3 — Komparativ выбор в предложении (опционально) ───────
// Пропускаю — у нас уже есть L2 Komparativ, не дублирую

// ─── Генератор: Ур 3 — Possessive Pronouns mc ────────────────────────────
const POSSESSIVE_PRONOUNS_TABLE = [
  { stem: "mein",  ru: "мой/моя/моё" },
  { stem: "dein",  ru: "твой/твоя/твоё" },
  { stem: "sein",  ru: "его" },
  { stem: "ihr",   ru: "её / их" },
  { stem: "unser", ru: "наш" },
  { stem: "euer",  ru: "ваш (мн.)" },
  { stem: "Ihr",   ru: "Ваш (вежл.)" },
];

// Окончания притяжательных по роду + падеж
// Для притяжательных в Akk masc → +en (meinen), в остальных как у "ein/eine"
function possessiveEnding(gender, kase) {
  if (kase === "Nom") {
    return { m: "", f: "e", n: "" }[gender] || "";
  }
  if (kase === "Akk") {
    return { m: "en", f: "e", n: "" }[gender] || "";
  }
  if (kase === "Dat") {
    return { m: "em", f: "er", n: "em" }[gender] || "";
  }
  return "";
}

function genL3_possessive(item) {
  // Берём существительное с известным родом
  if (item.pos !== "noun" || !item.gender || item.gender === "pl") return null;
  const p = POSSESSIVE_PRONOUNS_TABLE[Math.floor(Math.random() * POSSESSIVE_PRONOUNS_TABLE.length)];
  // Случайный падеж: Nom / Akk / Dat
  const cases = ["Nom", "Akk", "Dat"];
  const kase = cases[Math.floor(Math.random() * cases.length)];
  const ending = possessiveEnding(item.gender, kase);
  const correct = p.stem + ending;
  // Дистракторы — другие окончания того же притяжательного
  const altEndings = ["", "e", "en", "em", "er"];
  const distractors = altEndings.map(e => p.stem + e).filter(d => d !== correct);
  if (distractors.length < 3) return null;
  const opts = shuffle([correct, ...shuffle(distractors).slice(0, 3)]);
  const ans = opts.indexOf(correct);
  const nounStem = item.de.replace(/^(der |die |das )/, "");
  // Шаблон с привязкой к падежу
  const tmpls = {
    Nom: `___ ${nounStem} ist hier (${p.ru})`,
    Akk: `Ich habe ___ ${nounStem} (${p.ru})`,
    Dat: `Ich helfe ___ ${nounStem} (${p.ru})`,
  };
  return {
    auto: true, level: "A2", difficulty: 3, type: "mc",
    q: `Вставь притяжательное (${kase}):\n${tmpls[kase]}`,
    opts, ans,
    sourceId: item.id,
  };
}

// ─── Главная функция: собрать пул автогенерированных вопросов для топиков ──
function buildAutoQuestions(topics, vocab, conjugations) {
  // Берём слова из заданных topics
  const items = vocab.filter(v => (v.topics || []).some(t => topics.includes(t)));
  if (items.length === 0) return [];

  const pool = [];

  // Ур 1: для каждого слова — DE→RU и RU→DE
  for (const item of items) {
    const q1 = genL1_translate_DE_RU(item, vocab);
    if (q1) pool.push(q1);
    const q2 = genL1_translate_RU_DE(item, vocab);
    if (q2) pool.push(q2);
  }

  // Ур 2: артикли + plural для noun, спряжение для verb,
  //       Komparativ + topic-classify для adj/adv,
  //       Pers. Pronouns для блока местоимений
  for (const item of items) {
    // noun
    const qa = genL2_article(item);
    if (qa) pool.push(qa);
    const qpl = genL2_plural(item);
    if (qpl) pool.push(qpl);
    // verb
    const qc = genL2_conj_regelmaessig(item, vocab, conjugations);
    if (qc) pool.push(qc);
    // adj
    const qk = genL2_komparativ(item, vocab);
    if (qk) pool.push(qk);
    // adj/adv
    const qt = genL2_topic_classify(item, vocab);
    if (qt) pool.push(qt);
  }
  // Если есть местоимения в этой теме — Pers. Pronoun вопросы
  const hasPronouns = items.some(v => v.pos === "pron");
  if (hasPronouns) {
    // Генерим 5 случайных вопросов (они не привязаны к конкретному местоимению)
    for (let i = 0; i < 5; i++) {
      pool.push(genL2_pers_pronoun(vocab));
    }
  }

  // Ур 3: полное спряжение verbs + артикль в контексте noun + Possessive noun
  // Глаголы: full conj для каждого глагола в теме (regelmäßig из REGEL_VERBS, unregel из CONJUGATIONS)
  const verbsInTopic = items.filter(v => v.pos === "verb");
  for (const v of verbsInTopic) {
    // Пропускаем составные глаголы (с пробелами)
    if (v.de.includes(" ")) continue;
    // Сначала проверка в CONJUGATIONS (unregelmäßig)
    const conj = conjugations.find(c => c.verb === v.de);
    if (conj) {
      pool.push(genL3_unregel_full_conj(conj));
      continue;
    }
    // Затем REGEL_VERBS
    if (typeof REGEL_VERBS !== "undefined") {
      const reg = REGEL_VERBS.find(r => r.verb === v.de);
      if (reg) {
        pool.push({
          auto: true, level: "A1", difficulty: 3, type: "conj",
          q: `Проспрягай «${reg.verb}»${reg.ru ? " — " + reg.ru : ""} в Präsens:`,
          verb: reg.verb,
          tense: "Präsens",
          pronouns: ["ich", "du", "er/sie/es", "wir", "ihr", "sie/Sie"],
          ans: reg.forms,
          sourceId: reg.id,
        });
        continue;
      }
    }
    // Fallback — автогенератор regelmäßig
    const generated = [0,1,2,3,4,5].map(i => getConjForm(v.de, i, conjugations));
    pool.push({
      auto: true, level: "A1", difficulty: 3, type: "conj",
      q: `Проспрягай «${v.de}» — ${v.ru} в Präsens:`,
      verb: v.de,
      tense: "Präsens",
      pronouns: ["ich", "du", "er/sie/es", "wir", "ihr", "sie/Sie"],
      ans: generated,
      sourceId: v.id,
    });
  }

  // Артикли в контексте + Possessive — для существительных
  for (const item of items) {
    const qac = genL3_article_in_context(item);
    if (qac) pool.push(qac);
    const qpos = genL3_possessive(item);
    if (qpos) pool.push(qpos);
  }

  // ─── Partizip II ─────────────────────────────────────────────────────
  // Ур 3: таблица из 6 случайных regel-глаголов (если в теме есть глаголы)
  if (verbsInTopic.length >= 6) {
    const p2Table = genL3_partizip2_table(verbsInTopic, conjugations);
    if (p2Table) pool.push(p2Table);
    // Делаем 2-3 такие таблицы из разных глаголов
    const p2Table2 = genL3_partizip2_table(verbsInTopic, conjugations);
    if (p2Table2) pool.push(p2Table2);
  }

  // Ур 4: fill в Perfekt-предложении (несколько штук)
  if (verbsInTopic.length > 0) {
    for (let i = 0; i < 3; i++) {
      const q = genL4_perfekt_fill(verbsInTopic, conjugations);
      if (q) pool.push(q);
    }
  }

  return pool;
}
function genL1_unregel_translate_DE_RU(conj, allConjugations) {
  if (!conj.ru) return null;
  const distractors = allConjugations
    .filter(c => c.id !== conj.id && c.ru && c.ru !== conj.ru)
    .map(c => c.ru);
  if (distractors.length < 3) return null;
  const opts = shuffle([conj.ru, ...shuffle(distractors).slice(0, 3)]);
  const ans = opts.indexOf(conj.ru);
  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Переведи: «${conj.verb}»`,
    opts, ans,
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 1 — перевод глагола RU→DE ──────────────────────────
function genL1_unregel_translate_RU_DE(conj, allConjugations) {
  if (!conj.ru) return null;
  const distractors = allConjugations
    .filter(c => c.id !== conj.id && c.verb !== conj.verb)
    .map(c => c.verb);
  if (distractors.length < 3) return null;
  const opts = shuffle([conj.verb, ...shuffle(distractors).slice(0, 3)]);
  const ans = opts.indexOf(conj.verb);
  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Как сказать «${conj.ru}»?`,
    opts, ans,
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 2 — fill на одну форму ─────────────────────────────
function genL2_unregel_one_form(conj) {
  const pronounIdx = Math.floor(Math.random() * conj.pronouns.length);
  const pronoun = conj.pronouns[pronounIdx];
  const correctForm = conj.forms[pronounIdx];
  return {
    auto: true, level: "A1", difficulty: 2, type: "fill",
    q: `${pronoun} ___ (${conj.verb}${conj.ru ? " — " + conj.ru : ""})`,
    ans: correctForm,
    altAns: [],
    hint: `${conj.verb} в Präsens`,
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 2 — выбор формы Präsens (mc) ───────────────────────
// Дистракторы — другие формы ТОГО ЖЕ глагола (проверяем окончание для лица).
// Если различимых форм < 4 (heißen, sitzen и т.п.) — вопрос не создаётся (остаётся fill).
function genL2_unregel_one_form_mc(conj) {
  if (!conj || !conj.forms) return null;
  // Берём осмысленное лицо: du / er / ihr (ich тривиально, wir/sie часто = инфинитиву)
  const cand = [1, 2, 4].filter(i => conj.forms[i]);
  if (cand.length === 0) return null;
  const pronounIdx = cand[Math.floor(Math.random() * cand.length)];
  const correctForm = conj.forms[pronounIdx];
  const wrongForms = [...new Set(conj.forms.filter(f => f && f !== correctForm))];
  if (wrongForms.length < 3) return null;
  const distractors = shuffle(wrongForms).slice(0, 3);
  const opts = shuffle([correctForm, ...distractors]);
  const ans = opts.indexOf(correctForm);
  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `Спряги «${conj.verb}»${conj.ru ? " — " + conj.ru : ""} для «${conj.pronouns[pronounIdx]}»:`,
    opts, ans,
    sourceId: conj.id,
  };
}

// ─── unregel-блок: Ур 3 — conj на все 6 форм ─────────────────────────────
function genL3_unregel_full_conj(conj) {
  return {
    auto: true, level: "A2", difficulty: 3, type: "conj",
    q: `Проспрягай «${conj.verb}»${conj.ru ? " — " + conj.ru : ""} в Präsens:`,
    verb: conj.verb,
    tense: "Präsens",
    pronouns: conj.pronouns,
    ans: conj.forms,
    sourceId: conj.id,
  };
}

// ─── Генератор: Ур 3 — Partizip II таблица (6 случайных regel-глаголов) ───
// Цель: тренировать формирование Partizip II по правилам regelmäßig
function genL3_partizip2_table(verbsAvailable, conjugations) {
  // Берём 6 случайных regel-глаголов (которых нет в CONJUGATIONS как unregel)
  // verbsAvailable — массив VOCAB-записей глаголов
  const regelOnly = verbsAvailable.filter(v => {
    if (v.de.includes(" ")) return false;  // composite пропускаем
    const isUnregel = conjugations.find(c => c.verb === v.de);
    return !isUnregel;
  });
  if (regelOnly.length < 6) return null;
  const chosen = shuffle(regelOnly).slice(0, 6);
  return {
    auto: true, level: "A2", difficulty: 3, type: "conj",
    q: "Поставь в Partizip II (Perfekt):",
    verb: "partizip2",  // маркер
    tense: "Partizip II",
    pronouns: chosen.map(v => v.de),
    ans: chosen.map(v => getPartizip2(v.de, conjugations)),
  };
}

// ─── Генератор: Ур 4 — Perfekt-предложение (fill на Partizip II) ──────────
// Шаблоны: "Ich {aux} ... {p2}" — пользователь вписывает Partizip II
const PERFEKT_TEMPLATES_HABEN = [
  { tmpl: "Ich habe das Buch ___",       ru: "Я прочитал книгу", obj_pos: ["noun"] },
  { tmpl: "Sie hat ein Lied ___",        ru: "Она спела песню",   obj_pos: ["noun"] },
  { tmpl: "Wir haben die Hausaufgaben ___", ru: "Мы сделали уроки", obj_pos: ["noun"] },
  { tmpl: "Er hat den Test ___",         ru: "Он сделал тест",     obj_pos: ["noun"] },
  { tmpl: "Ich habe den ganzen Tag ___", ru: "Я весь день ...",    obj_pos: ["verb"] },
  { tmpl: "Wir haben gestern ___",       ru: "Вчера мы ...",        obj_pos: ["verb"] },
];

function genL4_perfekt_fill(verbsAvailable, conjugations) {
  // Берём случайный regel глагол (для unregel сейчас не делаем — другой генератор будет)
  const regelOnly = verbsAvailable.filter(v => {
    if (v.de.includes(" ")) return false;
    const isUnregel = conjugations.find(c => c.verb === v.de);
    if (isUnregel) return false;
    const aux = getAux(v.de, conjugations);
    return aux === "haben";  // пока только haben-глаголы
  });
  if (regelOnly.length === 0) return null;
  const verb = regelOnly[Math.floor(Math.random() * regelOnly.length)];
  const p2 = getPartizip2(verb.de, conjugations);
  // Шаблон по смыслу — берём из verb-шаблонов
  const tmpls = PERFEKT_TEMPLATES_HABEN.filter(t => t.obj_pos.includes("verb"));
  const tmpl = tmpls[Math.floor(Math.random() * tmpls.length)];
  return {
    auto: true, level: "A2", difficulty: 4, type: "fill",
    q: `Перфект — впиши Partizip II от «${verb.de}» (${verb.ru || ""}):\n${tmpl.tmpl}`,
    ans: p2,
    altAns: [],
    hint: `Partizip II от ${verb.de}`,
    sourceId: verb.id,
  };
}

// ─── Сборка пула вопросов для блока unregel ──────────────────────────────
function buildUnregelQuestions(conjugations) {
  const pool = [];
  for (const c of conjugations) {
    const q1a = genL1_unregel_translate_DE_RU(c, conjugations);
    if (q1a) pool.push(q1a);
    const q1b = genL1_unregel_translate_RU_DE(c, conjugations);
    if (q1b) pool.push(q1b);
    pool.push(genL2_unregel_one_form(c));
    { const qmc = genL2_unregel_one_form_mc(c); if (qmc) pool.push(qmc); }
    pool.push(genL3_unregel_full_conj(c));
  }
  return pool;
}

// ═══════════════════════════════════════════════════════════════
// МИНИ-ТЕСТ ПОСЛЕ КАРТОЧЕК UNREGEL: 37 вопросов (19 P2 + 18 Präsens)
// ═══════════════════════════════════════════════════════════════
// pickP2Distractors определена внутри buildPartizip2Pool — переиспользуем
// логику здесь автономно.
function buildUnregelMiniTest(conjugations) {
  const all = conjugations.slice(); // все 37

  // Глобальный список P2 для дистракторов (такой же как в buildPartizip2Pool)
  const globalP2Set = new Map();
  for (const c of conjugations) {
    if (c.partizip2) globalP2Set.set(c.partizip2, true);
  }
  if (typeof VOCAB !== "undefined") {
    for (const v of VOCAB) {
      if (v.pos === "verb" && !v.de.includes(" ")) {
        const p2 = partizip2Regelmaessig(v.de);
        if (p2) globalP2Set.set(p2, true);
      }
    }
  }
  const globalP2List = Array.from(globalP2Set.keys());

  function pickP2DistractorsLocal(verb, p2) {
    const taken = new Set([p2]);
    const result = [];
    function tryAdd(f) {
      if (!f || taken.has(f)) return;
      taken.add(f); result.push(f);
    }
    tryAdd(partizip2Regelmaessig(verb));
    if (result.length < 3) {
      const bySim = globalP2List
        .filter(d => d !== p2)
        .map(d => ({ p2: d, sim: trigramSimilarity(d, p2) }))
        .filter(x => x.sim >= DIST_SIM_THRESHOLD)
        .sort((a, b) => b.sim - a.sim);
      for (const { p2: d } of bySim) {
        if (result.length >= 3) break;
        tryAdd(d);
      }
    }
    if (result.length < 3) {
      for (const d of shuffle(globalP2List.filter(d => d !== p2))) {
        if (result.length >= 3) break;
        tryAdd(d);
      }
    }
    return result;
  }

  // ── ТИП 1: Partizip II (19 вопросов) ────────────────────────
  const shuffled = shuffle(all.slice());
  const p2Group = shuffled.slice(0, 19);
  const praesensGroup = shuffled.slice(19); // оставшиеся 18

  const PRONOUNS_IDX  = [0, 1, 2, 3, 4, 5]; // ich/du/er/wir/ihr/sie
  const PRONOUNS_DISP = ["ich", "du", "er/sie/es", "wir", "ihr", "sie/Sie"];

  const questions = [];

  for (const c of p2Group) {
    if (!c.partizip2) continue;
    const distractors = pickP2DistractorsLocal(c.verb, c.partizip2);
    if (distractors.length < 3) continue;
    const opts = shuffle([c.partizip2, ...distractors]);
    questions.push({
      auto: true, level: "A1", difficulty: 1, type: "mc",
      q: `Partizip II от «${c.verb}»${c.ru ? " — " + c.ru : ""}?`,
      opts, ans: opts.indexOf(c.partizip2),
      sourceId: c.id,
    });
  }

  // ── ТИП 2: Präsens-форма (18 вопросов) ──────────────────────
  for (const c of praesensGroup) {
    // Случайное лицо
    const pronounIdx = Math.floor(Math.random() * c.pronouns.length);
    const pronoun = c.pronouns[pronounIdx];
    const correctForm = c.forms[pronounIdx];
    if (!correctForm) continue;

    const taken = new Set([correctForm]);
    const result = [];
    function tryAdd(f) {
      if (!f || taken.has(f)) return;
      taken.add(f); result.push(f);
    }

    // 1. Другие формы того же глагола
    for (const f of shuffle(c.forms.filter(f => f && f !== correctForm))) {
      if (result.length >= 2) break;
      tryAdd(f);
    }

    // 2. Псевдо-regel-форма (без умляута)
    const pseudoRegelPronoun = ["ich", "du", "er", "wir", "ihr", "sie_pl"][pronounIdx] || "du";
    const pseudoRegel = conjRegelmaessig(c.verb, pseudoRegelPronoun);
    tryAdd(pseudoRegel);

    // 3. Добор из других unregel-глаголов того же лица
    if (result.length < 3) {
      const others = shuffle(conjugations.filter(o => o.id !== c.id && o.forms && o.forms[pronounIdx]));
      for (const o of others) {
        if (result.length >= 3) break;
        tryAdd(o.forms[pronounIdx]);
      }
    }

    if (result.length < 3) continue;

    const opts = shuffle([correctForm, ...result.slice(0, 3)]);
    questions.push({
      auto: true, level: "A1", difficulty: 1, type: "mc",
      q: `Форма «${pronoun}» от «${c.verb}»${c.ru ? " — " + c.ru : ""}?`,
      opts, ans: opts.indexOf(correctForm),
      sourceId: c.id,
    });
  }

  return shuffleMC(questions);
}

// Ур 1: «Что значит Partizip II X?» (Partizip → RU)
function genPerfL1_p2_to_ru(verb, allVerbs) {
  if (!verb.partizip2 || !verb.ru) return null;
  const distractors = allVerbs
    .filter(v => v !== verb && v.ru && v.ru !== verb.ru)
    .map(v => v.ru);
  if (distractors.length < 3) return null;
  const opts = shuffle([verb.ru, ...shuffle(distractors).slice(0, 3)]);
  const ans = opts.indexOf(verb.ru);
  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Что значит Partizip II «${verb.partizip2}»?`,
    opts, ans,
    sourceId: verb.id,
  };
}

// Ур 1: «Какой инфинитив у gegessen?» (Partizip → Infinitiv)
function genPerfL1_p2_to_inf(verb, allVerbs) {
  if (!verb.partizip2) return null;
  const distractors = allVerbs
    .filter(v => v !== verb && v.verb !== verb.verb)
    .map(v => v.verb);
  if (distractors.length < 3) return null;
  const opts = shuffle([verb.verb, ...shuffle(distractors).slice(0, 3)]);
  const ans = opts.indexOf(verb.verb);
  return {
    auto: true, level: "A1", difficulty: 1, type: "mc",
    q: `Какой инфинитив у Partizip II «${verb.partizip2}»?`,
    opts, ans,
    sourceId: verb.id,
  };
}

// Ур 2: «Какой aux у X?» (haben / sein)
function genPerfL2_aux(verb) {
  if (!verb.aux) return null;
  return {
    auto: true, level: "A1", difficulty: 2, type: "mc",
    q: `С каким вспомогательным глаголом «${verb.verb}» образует Perfekt?`,
    opts: ["haben", "sein"],
    ans: verb.aux === "sein" ? 1 : 0,
    hint: verb.ru || "",
    sourceId: verb.id,
  };
}

// Ур 3: fill — «Partizip II от X?»
function genPerfL3_p2_fill(verb) {
  if (!verb.partizip2) return null;
  return {
    auto: true, level: "A1", difficulty: 3, type: "fill",
    q: `Поставь в Partizip II: «${verb.verb}» — ${verb.ru || ""}`,
    ans: verb.partizip2,
    altAns: [],

    sourceId: verb.id,

}

// Ур 3: таблица из 6 случайных глаголов (regel или unregel) — Partizip II fill
function genPerfL3_p2_table(verbsAvailable) {
  if (verbsAvailable.length < 6) return null;
  const chosen = shuffle(verbsAvailable.slice()).slice(0, 6);
  return {
    auto: true, level: "A1", difficulty: 3, type: "conj",
    q: "Поставь в Partizip II:",
    verb: "partizip2",
    tense: "Partizip II",
    pronouns: chosen.map(v => v.verb),

  };
}

// Ур 4: fill в Perfekt-предложении (берёт aux + вписывает Partizip II)
const PERFEKT_SENTENCE_TEMPLATES = [
  { tmpl: "Ich {AUX} gestern lange ___", who: "ich" },
  { tmpl: "Wir {AUX} das Buch ___", who: "wir" },
  { tmpl: "Er {AUX} den ganzen Tag ___", who: "er" },
  { tmpl: "Sie {AUX} schon ___", who: "sie" },
  { tmpl: "{AUX} du heute ___?", who: "du" },
];

function genPerfL4_sentence(verb) {
  if (!verb.partizip2 || !verb.aux) return null;
  const tmpl = PERFEKT_SENTENCE_TEMPLATES[Math.floor(Math.random() * PERFEKT_SENTENCE_TEMPLATES.length)];
  // Спрягаем aux под местоимение из шаблона
  const auxForms = {
    haben: { ich: "habe", du: "hast", er: "hat", wir: "haben", ihr: "habt", sie: "haben" },
    sein:  { ich: "bin",  du: "bist", er: "ist", wir: "sind",  ihr: "seid", sie: "sind"  },
  };
  const auxForm = auxForms[verb.aux][tmpl.who];
  const sentence = tmpl.tmpl.replace("{AUX}", auxForm);
  return {
    auto: true, level: "A2", difficulty: 4, type: "fill",
    q: `Впиши Partizip II от «${verb.verb}» (${verb.ru || ""}):\n${sentence}`,
    ans: verb.partizip2,
    altAns: [],
    hint: `aux: ${verb.aux}`,
    sourceId: verb.id,

}

// Сборщик: пул вопросов для блока perfekt
function buildPerfektQuestions(blockId) {
  // blockId: "perfekt", "perfekt:regel", "perfekt:unregel"
  // Источники: REGEL_VERBS для regel, CONJUGATIONS для unregel
  let regelList = [];
  let unregelList = [];
  if (typeof REGEL_VERBS !== "undefined") regelList = REGEL_VERBS;
  if (typeof CONJUGATIONS !== "undefined") unregelList = CONJUGATIONS;

  let pool = [];
  let primary;  // основной список глаголов для генераторов
  if (blockId === "perfekt:regel") primary = regelList;
  else if (blockId === "perfekt:unregel") primary = unregelList;
  else primary = [...regelList, ...unregelList];

  const allForDistractors = [...regelList, ...unregelList];

  for (const v of primary) {
    if (!v.partizip2) continue;
    const q1a = genPerfL1_p2_to_ru(v, allForDistractors);
    if (q1a) pool.push(q1a);
    const q1b = genPerfL1_p2_to_inf(v, allForDistractors);
    if (q1b) pool.push(q1b);
    const q2 = genPerfL2_aux(v);
    if (q2) pool.push(q2);
    const q3 = genPerfL3_p2_fill(v);
    if (q3) pool.push(q3);
    const q4 = genPerfL4_sentence(v);
    if (q4) pool.push(q4);
  }
  // Ур 3 таблицы — 2-3 штуки
  for (let i = 0; i < 3; i++) {
    const q = genPerfL3_p2_table(primary.filter(v => v.partizip2));
    if (q) pool.push(q);
  }
  return pool;
}


// ═══════════════════════════════════════════════════════════════
// КОМБО-ТЕСТЫ: Partizip II / Präsens
// ═══════════════════════════════════════════════════════════════

// ─── Общий механизм квоты 30 вопросов (8/6/6/6/4 с каскадным добором) ───
function applyQuota30(autoPool, manualPool) {
  const QUOTA = { 1: 8, 2: 6, 3: 6, 4: 6, 5: 4 };
  const manualSourceIds = new Set(manualPool.map(q => q.sourceId).filter(Boolean));
  const autoFiltered = autoPool.filter(q => !q.sourceId || !manualSourceIds.has(q.sourceId));
  const byLevel = { 1: [], 2: [], 3: [], 4: [], 5: [] };
  for (const q of [...autoFiltered, ...manualPool]) {
    const lvl = q.difficulty || 1;
    if (byLevel[lvl]) byLevel[lvl].push(q);
  }
  const finalQuota = { ...QUOTA };
  for (const lvl of [5, 4, 3, 2]) {
    const available = byLevel[lvl].length;
    if (available < finalQuota[lvl]) {
      finalQuota[lvl - 1] += finalQuota[lvl] - available;
      finalQuota[lvl] = available;
    }
  }
  if (byLevel[1].length < finalQuota[1]) finalQuota[1] = byLevel[1].length;
  const session = [];
  for (const lvl of [1, 2, 3, 4, 5]) {
    session.push(...shuffle(byLevel[lvl]).slice(0, finalQuota[lvl]));
  }
  return shuffleMC(session);
}

// ─── Пул вопросов Partizip II (для VOCAB-глаголов из подблока) ───────────
const _PERF_COMBO_TMPLS = [
  { tmpl: "Ich {AUX} gestern ___", who: "ich" },
  { tmpl: "Wir {AUX} das schon ___", who: "wir" },
  { tmpl: "Er {AUX} heute ___", who: "er" },
  { tmpl: "{AUX} du das schon ___?", who: "du" },
];
const _AUX_FORMS = {
  haben: { ich: "habe", du: "hast", er: "hat", wir: "haben", ihr: "habt", sie: "haben" },
  sein:  { ich: "bin",  du: "bist", er: "ist", wir: "sind",  ihr: "seid", sie: "sind"  },
};

function buildPartizip2Pool(verbItems, conjugations) {
  const validVerbs = verbItems.filter(v => !v.de.includes(" "));
  if (validVerbs.length === 0) return [];

  // Собрать все Partizip II текущего подблока
  const allP2Entries = validVerbs.map(v => ({
    verb: v.de, p2: getPartizip2(v.de, conjugations),
    aux: getAux(v.de, conjugations), ru: v.ru, id: v.id,
  }));

  // ─── Глобальный пул дистракторов (весь CONJUGATIONS + VOCAB-глаголы) ─
  // Используем все известные P2-формы, а не только текущий подблок.
  // Это решает проблему: в маленьких подблоках (например modals, 8 глаголов)
  // триграммный поиск внутри подблока даёт 0 результатов (все sim=0.00),
  // и рандомный добор всегда берёт из того же кластера — дистракторы
  // выглядят слишком очевидно.
  const globalP2Set = new Map(); // p2 → true (дедупликация)
  for (const c of conjugations) {
    if (c.partizip2) globalP2Set.set(c.partizip2, true);
  }
  if (typeof VOCAB !== "undefined") {
    for (const v of VOCAB) {
      if (v.pos === "verb" && !v.de.includes(" ")) {
        const p2 = getPartizip2(v.de, conjugations);
        if (p2) globalP2Set.set(p2, true);
      }
    }
  }
  const globalP2List = Array.from(globalP2Set.keys());

  // ─── Гибридный выбор 3 дистракторов для P2 mc-вопроса ────────────────
  // 1. Псевдо-regel-форма (ловушка для unregel-глаголов)
  // 2. Триграммно похожие P2 из глобального пула (не только подблока)
  // 3. Рандом из глобального пула — добор
  function pickP2Distractors(entry) {
    const { verb, p2 } = entry;
    const taken = new Set([p2]);
    const result = [];
    function tryAdd(f) {
      if (!f || taken.has(f)) return;
      taken.add(f); result.push(f);
    }
    // 1. Псевдо-regel (ловушка: выглядит правдоподобно для нерегулярных)
    tryAdd(partizip2Regelmaessig(verb));
    // 2. Триграммно похожие P2 из глобального пула
    if (result.length < 3) {
      const bySim = globalP2List
        .filter(d => d !== p2)
        .map(d => ({ p2: d, sim: trigramSimilarity(d, p2) }))
        .filter(x => x.sim >= DIST_SIM_THRESHOLD)
        .sort((a, b) => b.sim - a.sim);
      for (const { p2: d } of bySim) {
        if (result.length >= 3) break;
        tryAdd(d);
      }
    }
    // 3. Рандом из глобального пула — добор если меньше 3
    if (result.length < 3) {
      for (const d of shuffle(globalP2List.filter(d => d !== p2))) {
        if (result.length >= 3) break;
        tryAdd(d);
      }
    }
    return result;
  }

  const pool = [];
  for (const entry of allP2Entries) {
    const { verb, p2, aux, ru, id } = entry;

    // Ур.1 mc — «Partizip II от X?»
    const distractors = pickP2Distractors(entry);
    if (distractors.length >= 3) {
      const opts = shuffle([p2, ...distractors]);
      pool.push({
        auto: true, level: "A1", difficulty: 1, type: "mc",
        q: `Partizip II от «${verb}»${ru ? " (" + ru + ")" : ""}?`,
        opts, ans: opts.indexOf(p2), sourceId: id,
      });
    }

    // Ур.2 fill — «Введи Partizip II»
    pool.push({
      auto: true, level: "A1", difficulty: 2, type: "fill",
      q: `Partizip II от «${verb}»${ru ? " — " + ru : ""}:`,
      ans: p2, altAns: [],
      hint: `ge…(t/en): ${verb}`,
      sourceId: id,
    });

    // Ур.3 mc — «Какой aux?»
    pool.push({
      auto: true, level: "A2", difficulty: 3, type: "mc",
      q: `С каким вспомогательным глаголом «${verb}» образует Perfekt?`,
      opts: ["haben", "sein"], ans: aux === "sein" ? 1 : 0,
      hint: ru || "", sourceId: id,
    });

    // Ур.4 fill — Perfekt-предложение
    const tmpl = _PERF_COMBO_TMPLS[Math.floor(Math.random() * _PERF_COMBO_TMPLS.length)];
    const auxForm = _AUX_FORMS[aux][tmpl.who];
    pool.push({
      auto: true, level: "A2", difficulty: 4, type: "fill",
      q: `Впиши Partizip II от «${verb}»${ru ? " (" + ru + ")" : ""}:\n${tmpl.tmpl.replace("{AUX}", auxForm)}`,
      ans: p2, altAns: [], hint: `aux: ${aux}`, sourceId: id,
    });
  }
  return pool;
}

// ─── Пул вопросов Präsens (для VOCAB-глаголов, без Partizip II / Perfekt) ──
function buildPraesensPool(verbItems, conjugations) {
  const pool = [];

  // Ур.1 — переводы
  for (const item of verbItems) {
    const q1a = genL1_translate_DE_RU(item, VOCAB);
    if (q1a) pool.push(q1a);
    const q1b = genL1_translate_RU_DE(item, VOCAB);
    if (q1b) pool.push(q1b);
  }

  // Ур.2 — одна форма Präsens
  for (const item of verbItems) {
    if (item.de.includes(" ")) continue;
    const conj = conjugations.find(c => c.verb === item.de);
    if (conj) {
      const q = genL2_unregel_one_form(conj);
      if (q) pool.push(q);
      const qmc = genL2_unregel_one_form_mc(conj);
      if (qmc) pool.push(qmc);
    } else {
      const q = genL2_conj_regelmaessig(item, VOCAB, conjugations);
      if (q) pool.push(q);
    }
  }

  // Ур.3 — полное спряжение Präsens (таблица)
  for (const item of verbItems) {
    if (item.de.includes(" ")) continue;
    const conj = conjugations.find(c => c.verb === item.de);
    if (conj) {
      pool.push(genL3_unregel_full_conj(conj));
      continue;
    }
    if (typeof REGEL_VERBS !== "undefined") {
      const reg = REGEL_VERBS.find(r => r.verb === item.de);
      if (reg) {
        pool.push({
          auto: true, level: "A1", difficulty: 3, type: "conj",
          q: `Проспрягай «${reg.verb}»${reg.ru ? " — " + reg.ru : ""} в Präsens:`,
          verb: reg.verb, tense: "Präsens",
          pronouns: ["ich", "du", "er/sie/es", "wir", "ihr", "sie/Sie"],
          ans: reg.forms, sourceId: reg.id,
        });
        continue;
      }
    }
    const generated = [0,1,2,3,4,5].map(i => getConjForm(item.de, i, conjugations));
    pool.push({
      auto: true, level: "A1", difficulty: 3, type: "conj",
      q: `Проспрягай «${item.de}» — ${item.ru || item.de} в Präsens:`,
      verb: item.de, tense: "Präsens",
      pronouns: ["ich", "du", "er/sie/es", "wir", "ihr", "sie/Sie"],
      ans: generated, sourceId: item.id,
    });
  }

  // ─── Ур.4 — глагол в предложении (tiles) ─────────────────────────────
  // Шаблоны Präsens-предложений. {VERB_ICH}, {VERB_DU}, {VERB_ER} — формы глагола.
  // words: массив слов-плиток в правильном порядке.
  const PRAESENS_TILES_TMPLS = [
    {
      build: (v, forms) => ({
        ru: `Я ${v.ru}.`,
        words: ["Ich", forms[0] + "."],
      }),
    },
    {
      build: (v, forms) => ({
        ru: `Ты ${v.ru}?`,
        words: [forms[1].charAt(0).toUpperCase() + forms[1].slice(1), "du?"],
      }),
    },
    {
      build: (v, forms) => ({
        ru: `Он ${v.ru}.`,
        words: ["Er", forms[2] + "."],
      }),
    },
    {
      build: (v, forms) => ({
        ru: `Мы ${v.ru}.`,
        words: ["Wir", forms[3] + "."],
      }),
    },
    {
      build: (v, forms) => ({
        ru: `Я сейчас ${v.ru}.`,
        words: ["Ich", forms[0], "gerade."],
      }),
    },
    {
      build: (v, forms) => ({
        ru: `Ты сейчас ${v.ru}?`,
        words: [forms[1].charAt(0).toUpperCase() + forms[1].slice(1), "du", "gerade?"],
      }),
    },
    {
      build: (v, forms) => ({
        ru: `Они ${v.ru}.`,
        words: ["Sie", forms[5] + "."],
      }),
    },
  ];

  // Для каждого глагола генерируем 1-2 tiles-вопроса (один на форму)
  for (const item of verbItems) {
    if (item.de.includes(" ")) continue;  // разделяемые — пропускаем
    if (!item.ru) continue;

    const forms = [0,1,2,3,4,5].map(i => getConjForm(item.de, i, conjugations));
    // Берём 2 случайных шаблона для разнообразия
    const chosen = shuffle(PRAESENS_TILES_TMPLS.slice()).slice(0, 2);
    for (const tmpl of chosen) {
      const built = tmpl.build(item, forms);
      if (!built || built.words.length < 2) continue;
      pool.push({
        auto: true, level: "A2", difficulty: 4, type: "tiles",
        q: `Составь: «${built.ru}»`,
        words: built.words,
        sourceId: item.id,
      });
    }
  }

  return pool;
}

// ─── Сборщик: Präteritum тест (30 вопросов) ──────────────────────────────
function buildPraeteritumTestSession(blockId, topics) {
  // Глаголы с praeteritum: сначала из CONJUGATIONS, потом из REGEL_VERBS
  let pool = [];

  // Глобальный список Präteritum-форм для дистракторов
  const allPraetForms = [];
  for (const c of CONJUGATIONS) {
    if (c.praeteritum) allPraetForms.push(c.praeteritum);
  }

  // Фильтр по теме (если не unregel — берём глаголы из topics)
  let conjList;
  if (blockId === "unregel") {
    conjList = CONJUGATIONS.filter(c => c.praeteritum);
  } else {
    const verbDe = new Set(
      VOCAB.filter(v => v.pos === "verb" && (v.topics || []).some(t => topics.includes(t)))
           .map(v => v.de)
    );
    conjList = CONJUGATIONS.filter(c => c.praeteritum && verbDe.has(c.verb));
  }

  for (const c of conjList) {
    const praet = c.praeteritum;

    // Тип 1: MC — выбрать Präteritum по инфинитиву
    const distractors = shuffle(allPraetForms.filter(f => f !== praet)).slice(0, 3);
    if (distractors.length >= 2) {
      const opts = shuffle([praet, ...distractors.slice(0, 3)]);
      pool.push({
        auto: true, level: c.level || "A2", difficulty: 2, type: "mc",
        q: `Präteritum от «${c.verb}»${c.ru ? " — " + c.ru : ""}?\n(er/sie/es)`,
        opts, ans: opts.indexOf(praet),
        sourceId: c.id,
      });
    }

    // Тип 2: fill — вписать Präteritum
    pool.push({
      auto: true, level: c.level || "A2", difficulty: 4, type: "fill",
      q: `Präteritum: er ___ (${c.verb}${c.ru ? " — " + c.ru : ""})`,
      ans: praet,
      hint: `Präteritum от ${c.verb}`,
      sourceId: c.id,
    });

    // Тип 3: перевод инфинитива DE→RU (чтоб знали что это за глагол)
    const otherRu = shuffle(CONJUGATIONS.filter(o => o.id !== c.id && o.ru).map(o => o.ru)).slice(0, 3);
    if (c.ru && otherRu.length >= 2) {
      const opts2 = shuffle([c.ru, ...otherRu.slice(0, 3)]);
      pool.push({
        auto: true, level: c.level || "A2", difficulty: 1, type: "mc",
        q: `«${c.verb}» в Präteritum: «${praet}» — что значит?`,
        opts: opts2, ans: opts2.indexOf(c.ru),
        sourceId: c.id,
      });
    }
  }

  return applyQuota30(pool, []);
}

// ─── Сборщик тестовой сессии: 30 вопросов по новой пропорции 8/6/6/6/4 ──
function buildTestSession(topics, vocab, conjugations, manualQuestions, blockId, levelFilter) {
  // Новые пропорции (Ур 1=8, Ур 2=6, Ур 3=6, Ур 4=6, Ур 5=4)
  // Если задан levelFilter (число 1-5) — это тест по одному уровню
  // Если null/undefined — это общий тест
  const QUOTA = { 1: 8, 2: 6, 3: 6, 4: 6, 5: 4 };
  // Размеры одиночных тестов по уровню
  const SOLO_SIZE = { 1: 15, 2: 15, 3: 15, 4: 10, 5: 10 };

  // Особый блок: unregel — используем собственный пул вопросов по CONJUGATIONS
  let autoPool;
  if (blockId === "unregel") {
    autoPool = buildUnregelQuestions(conjugations);
  } else if (blockId === "perfekt" || blockId.startsWith("perfekt:")) {
    autoPool = buildPerfektQuestions(blockId);
  } else {
    autoPool = buildAutoQuestions(topics, vocab, conjugations);
  }

  // 2. Ручные вопросы из QUESTIONS, привязанные к этому блоку или сабблоку
  // blockId может быть либо "verbs" (весь блок), либо "verbs:modal" (сабблок)
  const trainerTopic = `trainer:${blockId}`;
  let manualPool;
  if (blockId.includes(":")) {
    // Сабблок — берём только точное совпадение topics
    manualPool = manualQuestions.filter(q => q.topic === trainerTopic);
  } else {
    // Весь блок — берём и сам блок, и все его сабблоки
    const prefix = trainerTopic + ":";
    manualPool = manualQuestions.filter(q =>
      q.topic === trainerTopic || q.topic.startsWith(prefix)
    );
  }

  // 3. Дедупликация: если на одно слово есть ручной вопрос и авто-вопрос — оставить ручной
  const manualSourceIds = new Set(manualPool.map(q => q.sourceId).filter(Boolean));
  const autoFiltered = autoPool.filter(q => !q.sourceId || !manualSourceIds.has(q.sourceId));

  // 4. Объединяем по уровням
  const byLevel = { 1: [], 2: [], 3: [], 4: [], 5: [] };
  for (const q of [...autoFiltered, ...manualPool]) {
    const lvl = q.difficulty || 1;
    if (byLevel[lvl]) byLevel[lvl].push(q);
  }

  // ─── Тест по одному уровню ─────────────────────────────────────────────
  if (levelFilter && [1, 2, 3, 4, 5].includes(levelFilter)) {
    const wanted = SOLO_SIZE[levelFilter];
    const pool = shuffle(byLevel[levelFilter]).slice(0, wanted);
    return shuffleMC(pool);
  }

  // ─── Общий тест (все уровни) ────────────────────────────────────────────
  // Базовая квота: { 1: 8, 2: 7, 3: 6, 4: 5, 5: 4 } = 30
  // Если на каком-то уровне не хватает — недостача перетекает на ПРЕДЫДУЩИЙ уровень.
  // Пример: Ур5=0 → Ур4 расширяется с 5 до 9
  // Пример: Ур3=4 (нужно 6) → Ур2 расширяется с 7 до 9 (на 2 больше)
  const takenByLevel = { 1: [], 2: [], 3: [], 4: [], 5: [] };
  const used = new Set();

  // Сначала вычисляем итоговые квоты с учётом перетекания (сверху вниз)
  const finalQuota = { 1: QUOTA[1], 2: QUOTA[2], 3: QUOTA[3], 4: QUOTA[4], 5: QUOTA[5] };
  // Идём с самого верха (Ур 5) вниз. Если на уровне не хватает — донос на предыдущий
  for (const lvl of [5, 4, 3, 2]) {
    const available = byLevel[lvl].length;
    if (available < finalQuota[lvl]) {
      const shortfall = finalQuota[lvl] - available;
      finalQuota[lvl] = available;     // на этом уровне берём всё что есть
      finalQuota[lvl - 1] += shortfall; // недостающие добавляются в предыдущий
    }
  }
  // На Ур 1 может тоже не хватить — там просто берём что есть, никуда не переносим
  if (byLevel[1].length < finalQuota[1]) {
    finalQuota[1] = byLevel[1].length;
  }

  // Семплим по итоговым квотам
  for (const lvl of [1, 2, 3, 4, 5]) {
    const pool = shuffle(byLevel[lvl].filter(q => !used.has(q)));
    const take = pool.slice(0, finalQuota[lvl]);
    take.forEach(q => used.add(q));
    takenByLevel[lvl] = take;
  }

  // Сборка финального порядка: ПО УРОВНЯМ
  const session = [];
  for (const lvl of [1, 2, 3, 4, 5]) {
    session.push(...takenByLevel[lvl]);
  }

  // Перемешиваем MC опции (но не порядок вопросов!)
  return shuffleMC(session);
}

// КОМПОНЕНТ: ГЛАВНЫЙ APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const { theme, cycleTheme, icon } = useTheme();

  // ─── Состояние навигации ─────────────────────────────────────────────────
  // Фазы: home | select-block | select-subblock | block-start

  // ─── Карточки ───────────────────────────────────────────────────────────
  const [cardIdx, setCardIdx] = useState(0);

  // ─── Тест ───────────────────────────────────────────────────────────────
  const [questions, setQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [userAns, setUserAns] = useState("");
  const [answered, setAnswered] = useState(false);

  const [hintVisible, setHintVisible] = useState(false);

  // ─── Блок «Новые»: флаг перемешивания для «Общего изучения» ────────────

  const [devMode, setDevMode] = useState(false);
  const [devTapCount, setDevTapCount] = useState(0);
  const [devModalPool, setDevModalPool] = useState(null); // null = закрыто
