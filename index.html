<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Tools — Справочник и тренажёр по немецкому</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇩🇪</text></svg>">
<meta property="og:title" content="Deutsch Tools — Справочник и тренажёр по немецкому">
<meta property="og:description" content="Бесплатные инструменты для изучения немецкого: справочник и тренажёр">
<meta property="og:type" content="website">
<link rel="stylesheet" href="theme.css?v=1">
<style>
html, body {
  margin: 0; padding: 0;
  background: var(--bg-body);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ─── Навбар ──────────────────────────────── */
.dt-topnav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 20px 20px 0;
  box-sizing: border-box;
}
.dt-topnav__brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.dt-topnav__mark {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--grey-900);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.dt-topnav__word {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-title);
}

/* ─── Основной блок ──────────────────────────────── */
.main-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 720px;
  width: 100%;
  text-align: center;
}
.brand {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
h1 {
  font-size: clamp(1.75rem, 5vw, 2.6rem);
  color: var(--text-title);
  margin: 0 0 8px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.subtitle {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 48px;
}
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 32px;
}
@media (max-width: 600px) {
  .cards { grid-template-columns: 1fr; }
  h1 { font-size: 26px; }
}
.card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 16px;
  padding: 28px 24px;
  text-decoration: none;
  color: var(--text-main);
  box-shadow: var(--shadow);
  transition: transform 0.2s var(--ease-dt), box-shadow 0.2s var(--ease-dt);
  cursor: pointer;
  text-align: left;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}
.card-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
  flex-shrink: 0;
}
.card-icon svg { width: 24px; height: 24px; }
.card.cheatsheet .card-icon { background: var(--cyan-100); color: var(--cyan-700); }
.card.trainer .card-icon { background: var(--red-100); color: var(--red-700); }
.card-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-title);
  margin-bottom: 6px;
}
.card-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 22px;
}
.card .dt-cta {
  pointer-events: none;
  margin-top: auto;
  padding: 5px 5px 5px 16px;
  font-size: 13px;
}
.card:hover .dt-cta__roll-inner { transform: translateY(-50%); }
.card:hover .dt-cta__arrow { transform: rotate(-45deg); }
.card.cheatsheet:hover { border-color: var(--accent); }
.card.trainer:hover { border-color: var(--green); }
.footer {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 20px;
}
.footer a { color: var(--accent); text-decoration: none; }

/* ─── Модалка changelog ──────────── */
.changelog-modal {
  position: absolute;
  top: 68px;
  right: 16px;
  width: 360px;
  max-width: calc(100vw - 32px);
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  box-shadow: var(--shadow-modal);
  z-index: 100;
  display: none;
  text-align: left;
  overflow: hidden;
}
.changelog-modal.open { display: block; }
.changelog-modal.expanded {
  max-height: calc(100vh - 80px);
  display: flex;
  flex-direction: column;
}
.changelog-list {
  padding: 4px 0;
  overflow-y: auto;
}
.changelog-modal.expanded .changelog-list {
  flex: 1;
  min-height: 0;
}
.changelog-entry {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.changelog-entry:last-child { border-bottom: none; }
.changelog-date {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.changelog-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-title);
  margin-bottom: 8px;
}
.changelog-items {
  margin: 0;
  padding: 0;
  list-style: none;
}
.changelog-items li {
  font-size: 13px;
  color: var(--text-main);
  line-height: 1.5;
  padding-left: 12px;
  position: relative;
  margin-bottom: 4px;
}
.changelog-items li::before {
  content: "—";
  position: absolute;
  left: 0;
  color: var(--text-muted);
}
.changelog-more {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border-soft);
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
}
.changelog-more:hover { color: var(--text-main); }
.changelog-empty {
  padding: 24px 18px;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
}
.changelog-close {
  display: none;
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px;
  height: 32px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
}

/* Мобила: модалка на весь экран */
@media (max-width: 600px) {
  .changelog-modal {
    position: fixed;
    inset: 0;
    top: 0;
    right: 0;
    width: 100%;
    max-width: none;
    border-radius: 0;
    border: none;
    max-height: 100vh;
  }
  .changelog-modal.open {
    display: flex;
    flex-direction: column;
  }
  .changelog-modal .changelog-list { flex: 1; min-height: 0; }
  .changelog-close { display: block; }
}
</style>
<script>
// Инициализация темы ДО рендера
(function() {
  var saved = localStorage.getItem('theme') || 'auto';
  if (saved !== 'auto') document.documentElement.classList.add('theme-' + saved);
})();
</script>
</head>
<body>

<div class="dt-topnav">
  <div class="dt-topnav__brand">
    <span class="dt-topnav__mark">DT</span>
    <span class="dt-topnav__word">Deutsch Tools</span>
  </div>
  <div class="dt-nav">
    <button class="dt-icon-btn" id="bell-btn" onclick="toggleChangelog(event)" title="Что нового">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      <span class="dt-icon-btn__dot" id="bell-dot"></span>
    </button>
    <button class="dt-icon-btn" id="theme-btn" onclick="cycleTheme()" title="Переключить тему">
      <span id="theme-icon-wrap"></span>
    </button>
  </div>
</div>

<div class="changelog-modal" id="changelog-modal" role="dialog" aria-label="История обновлений">
  <button class="changelog-close" onclick="closeChangelog()" aria-label="Закрыть">×</button>
  <div class="changelog-list" id="changelog-list"></div>
  <button class="changelog-more" id="changelog-more" onclick="toggleExpand()" style="display:none;">ещё</button>
</div>

<div class="main-wrap">
<div class="container">
  <div class="brand">r4-studio</div>
  <h1>Deutsch Tools</h1>
  <div class="subtitle">Справочник и тренажёр по немецкому языку</div>

  <div class="cards">
    <a href="cheatsheet.html" class="card cheatsheet">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </div>
      <div class="card-title">Справочник</div>
      <div class="card-desc">Слова, грамматика, правила.<br>Поиск по всему словарю.</div>
      <span class="dt-cta">
        <span class="dt-cta__roll"><span class="dt-cta__roll-inner"><span>Открыть</span><span>Открыть</span></span></span>
        <span class="dt-cta__arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
      </span>
    </a>

    <a href="trainer.html" class="card trainer">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      </div>
      <div class="card-title">Тренажёр</div>
      <div class="card-desc">Карточки и тесты<br>по уровням сложности.</div>
      <span class="dt-cta">
        <span class="dt-cta__roll"><span class="dt-cta__roll-inner"><span>Открыть</span><span>Открыть</span></span></span>
        <span class="dt-cta__arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
      </span>
    </a>
  </div>

  <div class="footer">
    A1 → A2 · открытый проект ·
    <a href="https://github.com/r4-studio/deutsch-tools" target="_blank">GitHub</a>
  </div>
</div>
</div>

<script>
var THEME_ICONS = {
  auto: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor" stroke="none"/></svg>',
  light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>',
  dark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>'
};
function applyThemeIcon(theme) {
  var el = document.getElementById('theme-icon-wrap');
  var btn = document.getElementById('theme-btn');
  if (el) el.innerHTML = THEME_ICONS[theme] || THEME_ICONS.auto;
  if (btn) btn.title = 'Тема: ' + (theme === 'auto' ? 'авто (по системе)' : (theme === 'dark' ? 'тёмная' : 'светлая'));
}
function cycleTheme() {
  var html = document.documentElement;
  var saved = localStorage.getItem('theme') || 'auto';
  var next;
  if (saved === 'auto') next = 'light';
  else if (saved === 'light') next = 'dark';
  else next = 'auto';
  html.classList.remove('theme-light', 'theme-dark');
  if (next !== 'auto') html.classList.add('theme-' + next);
  localStorage.setItem('theme', next);
  applyThemeIcon(next);
}
applyThemeIcon(localStorage.getItem('theme') || 'auto');

// ─── Changelog ──────────────────────────────────
var CHANGELOG = [];
var MODAL_EXPANDED = false;

function formatDate(iso) {
  var p = iso.split('-');
  return p[2] + '.' + p[1] + '.' + p[0];
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderEntry(e) {
  var html = '<div class="changelog-entry">';
  html += '<div class="changelog-date">' + escapeHtml(formatDate(e.date)) + '</div>';
  if (e.title) html += '<div class="changelog-title">' + escapeHtml(e.title) + '</div>';
  if (e.items && e.items.length) {
    html += '<ul class="changelog-items">';
    e.items.forEach(function(it) {
      html += '<li>' + escapeHtml(it) + '</li>';
    });
    html += '</ul>';
  }
  html += '</div>';
  return html;
}

function renderChangelog() {
  var list = document.getElementById('changelog-list');
  var moreBtn = document.getElementById('changelog-more');
  if (!CHANGELOG.length) {
    list.innerHTML = '<div class="changelog-empty">Пока ничего нового</div>';
    moreBtn.style.display = 'none';
    return;
  }
  if (MODAL_EXPANDED) {
    list.innerHTML = CHANGELOG.map(renderEntry).join('');
  } else {
    list.innerHTML = renderEntry(CHANGELOG[0]);
  }
  // Показываем "more" только если есть что разворачивать
  if (CHANGELOG.length > 1) {
    moreBtn.style.display = 'block';
    moreBtn.textContent = MODAL_EXPANDED ? 'свернуть' : 'ещё';
  } else {
    moreBtn.style.display = 'none';
  }
}

function updateDot() {
  var dot = document.getElementById('bell-dot');
  if (!CHANGELOG.length) { dot.classList.remove('active'); return; }
  var lastSeen = localStorage.getItem('last_seen_changelog_date');
  if (!lastSeen || lastSeen < CHANGELOG[0].date) {
    dot.classList.add('active');
  } else {
    dot.classList.remove('active');
  }
}

function openChangelog() {
  var modal = document.getElementById('changelog-modal');
  MODAL_EXPANDED = false;
  modal.classList.remove('expanded');
  modal.classList.add('open');
  renderChangelog();
  if (CHANGELOG.length) {
    localStorage.setItem('last_seen_changelog_date', CHANGELOG[0].date);
    updateDot();
  }
}

function closeChangelog() {
  var modal = document.getElementById('changelog-modal');
  modal.classList.remove('open', 'expanded');
  MODAL_EXPANDED = false;
}

function toggleChangelog(ev) {
  ev.stopPropagation();
  var modal = document.getElementById('changelog-modal');
  if (modal.classList.contains('open')) closeChangelog();
  else openChangelog();
}

function toggleExpand() {
  var modal = document.getElementById('changelog-modal');
  MODAL_EXPANDED = !MODAL_EXPANDED;
  if (MODAL_EXPANDED) modal.classList.add('expanded');
  else modal.classList.remove('expanded');
  renderChangelog();
}

// Клик вне модалки
document.addEventListener('click', function(ev) {
  var modal = document.getElementById('changelog-modal');
  var bell = document.getElementById('bell-btn');
  if (!modal.classList.contains('open')) return;
  if (modal.contains(ev.target) || bell.contains(ev.target)) return;
  closeChangelog();
});

// Esc
document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape') closeChangelog();
});

// Загрузка changelog.js (работает и через file://, в отличие от fetch json)
(function loadChangelog() {
  var s = document.createElement('script');
  s.src = 'changelog.js?v=' + Date.now();
  s.onload = function() {
    var data = window.CHANGELOG;
    CHANGELOG = Array.isArray(data) ? data.slice(0, 10) : [];
    updateDot();
  };
  s.onerror = function() { /* нет файла — без точки, без модалки */ };
  document.head.appendChild(s);
})();
</script>

</body>
</html>
