<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Tools — Шпаргалка и тренажёр по немецкому</title>
<style>
/* ─── Переменные тем (синхронизированы со шпорой) ──────────── */
:root {
  --bg-body: #f0f2f5;
  --bg-card: #fff;
  --text-main: #333;
  --text-muted: #888;
  --text-title: #2c3e50;
  --border-soft: #e0e4ed;
  --accent: #3498db;
  --accent-dark: #2c80b4;
  --green: #1a7a4a;
  --green-dark: #146e3f;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
}
.theme-dark {
  --bg-body: #1a1a1a;
  --bg-card: #2a2a2a;
  --text-main: #e0e0e0;
  --text-muted: #888;
  --text-title: #d0d0d0;
  --border-soft: #3a3a3a;
  --accent: #5dade2;
  --accent-dark: #4a8cba;
  --green: #2ecc71;
  --green-dark: #27a560;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
}
@media (prefers-color-scheme: dark) {
  :root:not(.theme-light) {
    --bg-body: #1a1a1a;
    --bg-card: #2a2a2a;
    --text-main: #e0e0e0;
    --text-muted: #888;
    --text-title: #d0d0d0;
    --border-soft: #3a3a3a;
    --accent: #5dade2;
    --accent-dark: #4a8cba;
    --green: #2ecc71;
    --green-dark: #27a560;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
  }
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg-body);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 720px;
  width: 100%;
  text-align: center;
}
.brand {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
h1 {
  font-size: 32px;
  color: var(--text-title);
  margin: 0 0 8px;
  font-weight: 700;
}
.subtitle {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 48px;
}
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 32px;
}
@media (max-width: 600px) {
  .cards { grid-template-columns: 1fr; }
  h1 { font-size: 26px; }
}
.card {
  display: block;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 32px 24px;
  text-decoration: none;
  color: var(--text-main);
  box-shadow: var(--shadow);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}
.card-icon {
  font-size: 48px;
  margin-bottom: 16px;
  line-height: 1;
}
.card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-title);
  margin-bottom: 8px;
}
.card-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
}
.card.cheatsheet:hover { border-color: var(--accent); }
.card.trainer:hover { border-color: var(--green); }
.footer {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 20px;
}
.footer a { color: var(--accent); text-decoration: none; }
.theme-toggle {
  position: absolute;
  top: 16px; right: 16px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-main);
}
</style>
<script>
// Инициализация темы ДО рендера
(function() {
  var saved = localStorage.getItem('theme') || 'auto';
  if (saved !== 'auto') document.documentElement.classList.add('theme-' + saved);
})();
</script>
</head>
<body>

<button class="theme-toggle" onclick="cycleTheme()" title="Переключить тему">🌓</button>

<div class="container">
  <div class="brand">r4-studio</div>
  <h1>Deutsch Tools</h1>
  <div class="subtitle">Шпаргалка и тренажёр по немецкому языку</div>

  <div class="cards">
    <a href="cheatsheet.html" class="card cheatsheet">
      <div class="card-icon">📖</div>
      <div class="card-title">Шпаргалка</div>
      <div class="card-desc">Слова, грамматика, правила.<br>Поиск по всему словарю.</div>
    </a>

    <a href="trainer.html" class="card trainer">
      <div class="card-icon">🎯</div>
      <div class="card-title">Тренажёр</div>
      <div class="card-desc">Карточки и тесты<br>по уровням сложности.</div>
    </a>
  </div>

  <div class="footer">
    A1 → A2 · открытый проект ·
    <a href="https://github.com/r4-studio/deutsch-tools" target="_blank">GitHub</a>
  </div>
</div>

<script>
function cycleTheme() {
  var html = document.documentElement;
  var saved = localStorage.getItem('theme') || 'auto';
  var next;
  if (saved === 'auto') next = 'light';
  else if (saved === 'light') next = 'dark';
  else next = 'auto';
  html.classList.remove('theme-light', 'theme-dark');
  if (next !== 'auto') html.classList.add('theme-' + next);
  localStorage.setItem('theme', next);
}
</script>

</body>
</html>
