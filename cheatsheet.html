<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шпаргалка — Deutsch Tools</title>
<style>
:root {
  --bg-body: #f0f2f5;
  --bg-panel: #fff;
  --bg-tab: #eee;
  --bg-tab-active: #fff;
  --bg-th: #f8f9fa;
  --bg-rule-box: #fdfdfe;
  --bg-row-hover: #f9fdff;
  --bg-highlight: #ffeaa7;
  --text-main: #333;
  --text-muted: #555;
  --text-th: #7f8c8d;
  --text-title: #2c3e50;
  --border-soft: #eee;
  --border-row: #f1f1f1;
  --border-tab: #ccc;
  --accent: #3498db;
  --accent-dark: #2c80b4;
}
.theme-dark {
  --bg-body: #1a1a1a;
  --bg-panel: #2a2a2a;
  --bg-tab: #3a3a3a;
  --bg-tab-active: #2a2a2a;
  --bg-th: #333;
  --bg-rule-box: #2e2e2e;
  --bg-row-hover: #323232;
  --bg-highlight: #d4a373;
  --text-main: #e0e0e0;
  --text-muted: #aaa;
  --text-th: #888;
  --text-title: #fff;
  --border-soft: #3a3a3a;
  --border-row: #333;
  --border-tab: #444;
}
body {
  margin: 0; padding: 0;
  background: var(--bg-body);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.header-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-panel);
  padding: 10px 20px;
  border-bottom: 1px solid var(--border-soft);
  display: flex; gap: 15px; align-items: center;
}
.search-input {
  flex: 1; padding: 8px 12px;
  border: 1px solid var(--border-tab);
  border-radius: 4px; background: var(--bg-body); color: var(--text-main);
}
.tabs { display: flex; gap: 5px; padding: 10px 20px; background: var(--bg-tab); }
.tab {
  padding: 8px 16px; border: 1px solid var(--border-tab);
  border-bottom: none; border-radius: 4px 4px 0 0;
  background: var(--bg-tab); color: var(--text-main); cursor: pointer;
}
.tab.active { background: var(--bg-panel); font-weight: bold; }
.container { padding: 20px; max-width: 1000px; margin: 0 auto; }
.panel { display: none; background: var(--bg-panel); padding: 20px; border-radius: 8px; }
.panel.active { display: block; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-row); }
th { background: var(--bg-th); color: var(--text-th); font-size: 12px; text-transform: uppercase; }
tr:hover { background: var(--bg-row-hover); }
.gender-m { border-left: 4px solid #3498db; }
.gender-f { border-left: 4px solid #e74c3c; }
.gender-n { border-left: 4px solid #2ecc71; }
.gender-pl { border-left: 4px solid #9b59b6; }
.nav-btn { text-decoration: none; color: var(--accent); font-weight: bold; }
</style>
<script src="data.js"></script>
</head>
<body>

<div class="header-bar">
  <a href="index.html" class="nav-btn">← На главную</a>
  <input type="text" id="search" class="search-input" placeholder="Поиск по немецкому или русскому слову... (Enter для перехода)">
  <span id="searchCount" style="font-size:13px; color:var(--text-th)"></span>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('nouns')">Nouns</button>
  <button class="tab" onclick="showTab('verbs')">Verbs</button>
  <button class="tab" onclick="showTab('other')">Adj/Adv/Pron</button>
</div>

<div class="container">
  <div id="tab-nouns" class="panel active">
    <h2>Существительные</h2>
    <table>
      <thead>
        <tr><th>Слово (Артикль)</th><th>Множественное число</th><th>Перевод</th></tr>
      </thead>
      <tbody id="nouns-list"></tbody>
    </table>
  </div>

  <div id="tab-verbs" class="panel">
    <h2>Глаголы</h2>
    <table>
      <thead>
        <tr><th>Инфинитив</th><th>Перевод</th><th>Примечание</th></tr>
      </thead>
      <tbody id="verbs-list"></tbody>
    </table>
  </div>

  <div id="tab-other" class="panel">
    <h2>Прилагательные, Наречия и Местоимения</h2>
    <table>
      <thead>
        <tr><th>Слово</th><th>Часть речи</th><th>Перевод</th></tr>
      </thead>
      <tbody id="other-list"></tbody>
    </table>
  </div>
</div>

<script>
function showTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

document.addEventListener("DOMContentLoaded", () => {
  if (typeof VOCAB === "undefined") return;

  const nounsList = document.getElementById("nouns-list");
  const verbsList = document.getElementById("verbs-list");
  const otherList = document.getElementById("other-list");

  VOCAB.forEach(word => {
    const tr = document.createElement("tr");
    tr.setAttribute("data-de", word.de.toLowerCase());
    tr.setAttribute("data-ru", word.ru.toLowerCase());

    if (word.pos === "noun") {
      tr.className = `gender-${word.gender}`;
      const art = word.gender === 'm' ? 'der' : word.gender === 'f' ? 'die' : word.gender === 'n' ? 'das' : 'die';
      tr.innerHTML = `<td><b>${art} ${word.de}</b></td><td>${word.plural || '—'}</td><td>${word.ru}</td>`;
      nounsList.appendChild(tr);
    } else if (word.pos === "verb") {
      tr.innerHTML = `<td><b>${word.de}</b></td><td>${word.ru}</td><td><small>${word.note || '—'}</small></td>`;
      verbsList.appendChild(tr);
    } else if (['adj', 'adv', 'pron'].includes(word.pos)) {
      tr.innerHTML = `<td><b>${word.de}</b></td><td><small>${word.pos}</small></td><td>${word.ru}</td>`;
      otherList.appendChild(tr);
    }
  });

  // Логика простого поиска
  const searchInput = document.getElementById("search");
  searchInput.addEventListener("input", () => {
    const query = searchInput.value.toLowerCase().trim();
    let matches = 0;

    document.querySelectorAll("tbody tr").forEach(tr => {
      if (!query || tr.getAttribute("data-de").includes(query) || tr.getAttribute("data-ru").includes(query)) {
        tr.style.display = "";
        if(query) matches++;
      } else {
        tr.style.display = "none";
      }
    });
    document.getElementById("searchCount").innerText = query ? `${matches} совпадений` : "";
  });
});
</script>
</body>
</html>
